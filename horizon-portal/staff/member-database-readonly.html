<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Database (Read Only) — Horizon House</title>
    <style>
        :root {
            --hh-primary: #F58634;
            --hh-gold: #E1C462;
            --hh-green: #94A880;
            --hh-bg: #FFF8F3;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--hh-bg); color: #2d2d2d; min-height: 100vh; }

        /* ── Header ──────────────────────────────────────────────────── */
        header {
            background: var(--hh-primary); color: #fff; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.12);
        }
        header h1 { font-size: 18px; font-weight: 700; }
        .staff-name { font-size: 13px; opacity: .85; margin-left: 8px; }
        .btn-logout { background: rgba(255,255,255,.2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; border: none; color: #fff; font-weight: 600; }
        .btn-logout:hover { background: rgba(255,255,255,.3); }

        /* ── Toolbar ─────────────────────────────────────────────────── */
        .toolbar {
            padding: 14px 24px; background: #fff; border-bottom: 1px solid #e2e8f0;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between;
        }
        .toolbar h2 { font-size: 16px; color: #2d3748; }
        .toolbar-right { display: flex; gap: 8px; align-items: center; }
        #searchInput {
            padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; width: 250px;
        }
        #searchInput:focus { outline: none; border-color: var(--hh-primary); }
        .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .tab {
            padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #4a5568;
            transition: all .15s;
        }
        .tab.active { background: var(--hh-primary); border-color: var(--hh-primary); color: #fff; }

        /* ── Stats ───────────────────────────────────────────────────── */
        .stats {
            padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
        }
        .stat-card {
            background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
        }
        .stat-card .number { font-size: 28px; font-weight: 700; color: var(--hh-primary); }
        .stat-card .label { font-size: 12px; color: #718096; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

        /* ── Table ───────────────────────────────────────────────────── */
        .table-wrap { padding: 16px 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
        thead { background: #f8fafc; }
        th { 
            padding: 11px 14px; text-align: left; font-size: 12px; font-weight: 700; 
            color: #718096; text-transform: uppercase; letter-spacing: .04em; 
            border-bottom: 1px solid #e2e8f0; white-space: nowrap; position: sticky; top: 56px; background: #f8fafc;
        }
        td { padding: 11px 14px; font-size: 14px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fffbf5; }
        td code { font-size: 12px; background: #f0f4f8; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        /* ── Status Badges ───────────────────────────────────────────── */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; }
        .badge-0 { background: #a0aec0; }
        .badge-1 { background: #48bb78; }
        .badge-2 { background: #ecc94b; color: #744210; }
        .badge-3 { background: #ed8936; }
        .badge-4 { background: #4299e1; }
        .badge-5 { background: #805ad5; }
        .badge-H { background: #e53e3e; }
        .badge-W { background: #f6ad55; }

        /* ── Loading/Error ───────────────────────────────────────────── */
        .loading, .error { text-align: center; padding: 60px 24px; }
        .loading { color: #718096; font-size: 16px; }
        .error { color: #e53e3e; font-size: 15px; background: #fff5f5; margin: 24px; border-radius: 12px; border: 1px solid #feb2b2; }
        .empty { text-align: center; padding: 60px 24px; color: #a0aec0; font-size: 15px; }

        /* ── Print Styles ────────────────────────────────────────────── */
        @media print {
            body { background: #fff; }
            header, .toolbar-right, .btn-logout { display: none; }
            .table-wrap { padding: 0; }
            table { box-shadow: none; }
            tbody tr:hover { background: none; }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>👥 Member Database (Read Only)</h1>
            <span class="staff-name" id="staffName"></span>
        </div>
        <button class="btn-logout" onclick="logout()">Log Out</button>
    </header>

    <div class="toolbar">
        <h2>View Active Members</h2>
        <div class="toolbar-right">
            <div class="filter-tabs">
                <button class="tab active" data-filter="all" onclick="filterMembers('all')">All</button>
                <button class="tab" data-filter="active" onclick="filterMembers('active')">Active (1)</button>
                <button class="tab" data-filter="alumni" onclick="filterMembers('alumni')">Alumni (2)</button>
                <button class="tab" data-filter="men" onclick="filterMembers('men')">Men</button>
                <button class="tab" data-filter="women" onclick="filterMembers('women')">Women</button>
            </div>
            <input type="text" id="searchInput" placeholder="Search by name, ID, bed..." onkeyup="performSearch()">
            <button class="btn-logout" onclick="window.print()">🖨️ Print</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalCount">-</div>
            <div class="label">Total Members</div>
        </div>
        <div class="stat-card">
            <div class="number" id="activeCount">-</div>
            <div class="label">Active</div>
        </div>
        <div class="stat-card">
            <div class="number" id="menCount">-</div>
            <div class="label">Men</div>
        </div>
        <div class="stat-card">
            <div class="number" id="womenCount">-</div>
            <div class="label">Women</div>
        </div>
    </div>

    <div id="loadingMessage" class="loading">Loading member data...</div>
    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="emptyMessage" class="empty" style="display: none;">No members found.</div>

    <div class="table-wrap" id="tableWrap" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>Member ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>M/F</th>
                    <th>Bed</th>
                    <th>DOB</th>
                    <th>Admit Date</th>
                    <th>Sober Date</th>
                    <th>Days Here</th>
                    <th>Days Sober</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="memberTableBody">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
        let allMembers = [];
        let currentFilter = 'all';

        // Format date from Excel serial or string
        function formatDate(val) {
            if (!val || val === '' || val === 'not') return '-';
            if (typeof val === 'string' && val.includes('/')) return val;
            
            const excelEpoch = new Date(1899, 11, 30);
            const jsDate = new Date(excelEpoch.getTime() + val * 86400000);
            
            const month = String(jsDate.getMonth() + 1).padStart(2, '0');
            const day = String(jsDate.getDate()).padStart(2, '0');
            const year = jsDate.getFullYear();
            
            return `${month}/${day}/${year}`;
        }

        // Calculate days between dates
        function calculateDays(dateVal) {
            if (!dateVal || dateVal === '' || dateVal === 'not') return '-';
            
            let jsDate;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(1899, 11, 30);
                jsDate = new Date(excelEpoch.getTime() + dateVal * 86400000);
            } else {
                jsDate = new Date(dateVal);
            }
            
            const today = new Date();
            const diffTime = Math.abs(today - jsDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays;
        }

        // Get status badge HTML
        function getStatusBadge(status) {
            const statusMap = {
                '0': 'Waitlist',
                '1': 'Active',
                '2': 'Alumni',
                '3': 'Discharged',
                '4': 'Manager',
                '5': 'Admin',
                'H': 'Hold',
                'W': 'Waitlist'
            };
            const label = statusMap[status] || status;
            return `<span class="badge badge-${status}">${label}</span>`;
        }

        // Load members from backend
        async function loadMembers() {
            try {
                const response = await fetch(`${API_BASE}/api/members`);
                if (!response.ok) throw new Error('Failed to fetch members');
                
                allMembers = await response.json();
                
                // Filter to show only active members (status 1, 2, 4)
                allMembers = allMembers.filter(m => {
                    const status = m.STATUS || m.STATU || m.status || '';
                    return status === 1 || status === 2 || status === 4 || status === '1' || status === '2' || status === '4';
                });

                updateStats();
                renderTable();
                
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('tableWrap').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading members:', error);
                document.getElementById('loadingMessage').style.display = 'none';
                const errorEl = document.getElementById('errorMessage');
                errorEl.textContent = 'Error loading member data. Please try again later.';
                errorEl.style.display = 'block';
            }
        }

        // Update statistics
        function updateStats() {
            const active = allMembers.filter(m => {
                const status = m.STATUS || m.STATU || m.status || '';
                return status === 1 || status === '1';
            });
            const men = allMembers.filter(m => {
                const gender = (m['M/F'] || m.GENDER || '').toString().toUpperCase();
                return gender === 'M' || gender.startsWith('M');
            });
            const women = allMembers.filter(m => {
                const gender = (m['M/F'] || m.GENDER || '').toString().toUpperCase();
                return gender === 'F' || gender.startsWith('F');
            });

            document.getElementById('totalCount').textContent = allMembers.length;
            document.getElementById('activeCount').textContent = active.length;
            document.getElementById('menCount').textContent = men.length;
            document.getElementById('womenCount').textContent = women.length;
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('memberTableBody');
            const filtered = getFilteredMembers();

            if (filtered.length === 0) {
                document.getElementById('tableWrap').style.display = 'none';
                document.getElementById('emptyMessage').style.display = 'block';
                return;
            }

            document.getElementById('tableWrap').style.display = 'block';
            document.getElementById('emptyMessage').style.display = 'none';

            // Sort by member ID
            filtered.sort((a, b) => {
                const idA = parseInt(a.ID || 0);
                const idB = parseInt(b.ID || 0);
                return idB - idA; // Newest first
            });

            tbody.innerHTML = filtered.map(member => {
                const memberId = member.ID || '-';
                const firstName = member['FIRST\r\nNAME'] || member['FIRST NAME'] || member.FIRST_NAME || member.firstName || '-';
                const lastName = member['LAST\r\nNAME'] || member['LAST NAME'] || member.LAST_NAME || member.lastName || '-';
                const gender = (member['M/F'] || member.GENDER || '-').toString().toUpperCase();
                const bed = member.BED || member['BED#'] || '-';
                const dob = formatDate(member.DOB || member['DATE OF\r\nBIRTH'] || member.dateOfBirth || '');
                const admitDate = formatDate(member['ADMIT\r\nDATE'] || member['ADMIT DATE'] || member.ADMIT_DATE || member.admitDate || '');
                const soberDate = formatDate(member['SOBER\r\nDATE'] || member['SOBER DATE'] || member.SOBRIETY_DATE || member.sobrietyDate || '');
                const daysHere = calculateDays(member['ADMIT\r\nDATE'] || member['ADMIT DATE'] || member.ADMIT_DATE || member.admitDate || '');
                const daysSober = calculateDays(member['SOBER\r\nDATE'] || member['SOBER DATE'] || member.SOBRIETY_DATE || member.sobrietyDate || '');
                const phone = member.PHONE || member['PHONE NUMBER'] || member.phone || '-';
                const email = member.EMAIL || member['E-MAIL'] || member.email || '-';
                const status = member.STATUS || member.STATU || member.status || '-';

                return `
                    <tr>
                        <td><code>${memberId}</code></td>
                        <td>${firstName}</td>
                        <td>${lastName}</td>
                        <td>${gender}</td>
                        <td><strong>${bed}</strong></td>
                        <td>${dob}</td>
                        <td>${admitDate}</td>
                        <td>${soberDate}</td>
                        <td>${daysHere !== '-' ? daysHere + ' days' : '-'}</td>
                        <td style="color: #2e7d32; font-weight: bold;">${daysSober !== '-' ? daysSober + ' days' : '-'}</td>
                        <td>${phone}</td>
                        <td>${email}</td>
                        <td>${getStatusBadge(status)}</td>
                    </tr>
                `;
            }).join('');
        }

        // Get filtered members based on current filter
        function getFilteredMembers() {
            return allMembers.filter(member => {
                const status = member.STATUS || member.STATU || member.status || '';
                const gender = (member['M/F'] || member.GENDER || '').toString().toUpperCase();
                
                if (currentFilter === 'active' && status !== 1 && status !== '1') return false;
                if (currentFilter === 'alumni' && status !== 2 && status !== '2') return false;
                if (currentFilter === 'men' && !gender.startsWith('M')) return false;
                if (currentFilter === 'women' && !gender.startsWith('F')) return false;
                
                return true;
            });
        }

        // Filter members
        function filterMembers(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.tab').forEach(tab => {
                if (tab.dataset.filter === filter) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            renderTable();
        }

        // Search members
        function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('memberTableBody');
            const rows = tbody.querySelectorAll('tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }

        // Logout
        function logout() {
            sessionStorage.clear();
            localStorage.clear();
            window.location.href = '/horizon-portal/staff-login.html';
        }

        // Check authentication (basic check - enhance as needed)
        function checkAuth() {
            const staffId = sessionStorage.getItem('staffId');
            const staffName = sessionStorage.getItem('staffName');
            
            if (!staffId) {
                // Redirect to login if not authenticated
                window.location.href = '/horizon-portal/staff-login.html';
                return;
            }
            
            document.getElementById('staffName').textContent = staffName ? `(${staffName})` : `(ID: ${staffId})`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadMembers();
        });
    </script>
</body>
</html>
