<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Accounting Dashboard - Horizon House</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7fafc; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 32px; }
        h1 { color: #2d3748; margin-bottom: 24px; }
        .section { margin-bottom: 32px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th, td { padding: 10px; border: 1px solid #e2e8f0; text-align: left; }
        th { background: #edf2f7; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; background: #667eea; color: #fff; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #5a67d8; }
        .input { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Staff Accounting Dashboard</h1>
        <div class="section">
            <h2>Invoices</h2>
            <table id="invoicesTable">
                <thead>
                    <tr><th>InvoiceID</th><th>MemberID</th><th>Name</th><th>Billed To</th><th></th>DueDate</th><th>Amount</th><th>Status</th><th>DateSent</th><th>DatePaid</th><th>Notes</th><th>Print</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn" onclick="addInvoice()">Add Invoice</button>
        </div>
        <div class="section">
            <h2>Payments</h2>
            <table id="paymentsTable">
                <thead>
                    <tr><th>PaymentID</th><th>InvoiceID</th><th>MemberID</th><th>Name</th><th>Date</th><th>Amount</th><th>Method</th><th>Notes</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn" onclick="addPayment()">Add Payment</button>
        </div>
        <div class="section">
            <h2>Expenses</h2>
            <table id="expensesTable">
                <thead>
                    <tr><th>ExpenseID</th><th>Date</th><th>Category</th><th>Amount</th><th>Description</th><th>Staff</th><th>Receipt</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn" onclick="addExpense()">Add Expense</button>
            <input type="file" id="receiptInput" accept="image/*" style="display:none" onchange="uploadReceipt(event)">
            <button class="btn" onclick="document.getElementById('receiptInput').click()">Scan Receipt</button>
        </div>
        <div class="section">
            <h2>Income</h2>
            <table id="incomeTable">
                <thead>
                    <tr><th>IncomeID</th><th>Date</th><th>Source</th><th>Amount</th><th>Description</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn" onclick="addIncome()">Add Income</button>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:3001';
        
        // Fetch and render invoices
        function loadInvoices() {
            fetch(`${API_URL}/api/accounting/invoices`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector('#invoicesTable tbody');
                    tbody.innerHTML = '';
                    (data.invoices || []).forEach(inv => {
                        const tr = document.createElement('tr');
                        const billedTo = inv.BilledTo || inv.Name || '';
                        tr.innerHTML = `
                            <td>${inv.InvoiceID||''}</td>
                            <td>${inv.MemberID||''}</td>
                            <td>${inv.Name||''}</td>
                            <td>${billedTo}</td>
                            <td>${inv.DueDate||''}</td>
                            <td>${inv.Amount||''}</td>
                            <td>${inv.Status||''}</td>
                            <td>${inv.DateSent||''}</td>
                            <td>${inv.DatePaid||''}</td>
                            <td>${inv.Notes||''}</td>
                            <td><button class="btn" onclick='printInvoice(${JSON.stringify(inv)})'>🖨️ Print</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function printInvoice(inv) {
            // Open the invoice template in a new window and inject data
            const win = window.open('invoice-template.html', '_blank');
            win.onload = function() {
                win.document.getElementById('invoiceId').textContent = inv.InvoiceID || '';
                win.document.getElementById('dateSent').textContent = inv.DateSent || '';
                win.document.getElementById('dueDate').textContent = inv.DueDate || '';
                win.document.getElementById('memberName').textContent = inv.Name || '';
                win.document.getElementById('memberId').textContent = inv.MemberID || '';
                
                // Set Bill To fields (use BilledTo if different from member)
                const billedToName = inv.BilledTo || inv.Name || '';
                win.document.getElementById('billToName').textContent = billedToName;
                win.document.getElementById('billToAddress').innerHTML = inv.BillToAddress || '&nbsp;';
                
                // Set invoice items and total
                const itemsBody = win.document.getElementById('invoiceItems');
                itemsBody.innerHTML = `
                    <tr><td>Monthly Housing Fee</td><td class="amount-col">$${Number(inv.Amount || 0).toFixed(2)}</td></tr>
                    <tr><td>&nbsp;</td><td class="amount-col">&nbsp;</td></tr>
                    <tr><td>&nbsp;</td><td class="amount-col">&nbsp;</td></tr>
                    <tr><td>&nbsp;</td><td class="amount-col">&nbsp;</td></tr>
                `;
                win.document.getElementById('totalAmount').textContent = `$${Number(inv.Amount || 0).toFixed(2)}`;
                setTimeout(() => win.print(), 500);
            };
        }

        // Helper function to convert Excel serial date to JS Date
        function excelDateToJSDate(serial) {
            if (!serial || isNaN(serial)) return null;
            const utc_days = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;
            const date_info = new Date(utc_value * 1000);
            return new Date(date_info.getFullYear(), date_info.getMonth(), date_info.getDate());
        }
        
        // Calculate next due date based on admit date
        function getNextDueDate(admitDate) {
            const admit = excelDateToJSDate(admitDate);
            if (!admit) return new Date();
            
            const today = new Date();
            const dayOfMonth = admit.getDate();
            
            // Start with current month, same day as admit date
            let nextDue = new Date(today.getFullYear(), today.getMonth(), dayOfMonth);
            
            // If that date has passed, move to next month
            if (nextDue <= today) {
                nextDue = new Date(today.getFullYear(), today.getMonth() + 1, dayOfMonth);
            }
            
            return nextDue;
        }

        // Add invoice with member lookup
        async function addInvoice() {
            let memberId = prompt('Member ID:');
            if (!memberId) return;
            
            // Strip leading zeros and convert to number for lookup
            memberId = parseInt(memberId, 10);
            
            // Look up member data from members.xlsx
            try {
                const response = await fetch(`${API_URL}/api/getMember?id=${memberId}`);
                const data = await response.json();
                
                let memberName = '';
                let billedTo = '';
                let defaultAmount = '';
                let defaultDueDate = new Date(Date.now() + 15*24*60*60*1000).toISOString().slice(0,10);
                
                if (data && data.FIRST_NAME) {
                    memberName = `${data.FIRST_NAME || ''} ${data.LAST_NAME || ''}`.trim();
                    defaultAmount = data.RATE || '';
                    
                    // Calculate next due date based on admit date
                    if (data.ADMIT_DATE) {
                        const nextDue = getNextDueDate(data.ADMIT_DATE);
                        defaultDueDate = nextDue.toISOString().slice(0,10);
                    }
                    
                    alert(`Found member: ${memberName}\nAdmit Date: ${data.ADMIT_DATE ? excelDateToJSDate(data.ADMIT_DATE).toLocaleDateString() : 'N/A'}\nMonthly Rate: $${defaultAmount}\nNext Due: ${defaultDueDate}`);
                } else {
                    memberName = prompt('Member not found. Enter name manually:');
                    if (!memberName) return;
                }
                
                // Ask for Billed To (if different from member)
                billedTo = prompt('Billed To (leave empty if same as member):', '');
                if (billedTo === null) return; // User cancelled
                if (!billedTo.trim()) billedTo = memberName;
                
                const dueDate = prompt('Due Date (YYYY-MM-DD):', defaultDueDate);
                const amount = prompt('Amount:', defaultAmount);
                if (!dueDate || !amount) return;
                
                const invoiceData = {
                    MemberID: memberId,
                    Name: memberName,
                    BilledTo: billedTo,
                    DueDate: dueDate,
                    Amount: amount,
                    Status: 'Unpaid',
                    DateSent: new Date().toISOString().slice(0,10)
                };
                
                const result = await fetch(`${API_URL}/api/accounting/invoices`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(invoiceData)
                });
                
                if (result.ok) {
                    alert('Invoice created successfully!');
                    loadInvoices();
                } else {
                    alert('Failed to create invoice');
                }
            } catch (error) {
                console.error('Error creating invoice:', error);
                alert('Error creating invoice: ' + error.message);
            }
        }

        // Fetch and render payments
        function loadPayments() {
            fetch(`${API_URL}/api/accounting/payments`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector('#paymentsTable tbody');
                    tbody.innerHTML = '';
                    (data.payments || []).forEach(pay => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${pay.PaymentID||''}</td><td>${pay.InvoiceID||''}</td><td>${pay.MemberID||''}</td><td>${pay.Name||''}</td><td>${pay.Date||''}</td><td>${pay.Amount||''}</td><td>${pay.Method||''}</td><td>${pay.Notes||''}</td>`;
                        tbody.appendChild(tr);
                    });
                });
        }

        // Add payment with member lookup
        async function addPayment() {
            const invoiceId = prompt('Invoice ID:');
            if (!invoiceId) return;
            
            let memberId = prompt('Member ID:');
            if (!memberId) return;
            
            // Strip leading zeros and convert to number for lookup
            memberId = parseInt(memberId, 10);
            
            // Look up member data from members.xlsx
            try {
                const response = await fetch(`${API_URL}/api/getMember?id=${memberId}`);
                const data = await response.json();
                
                let memberName = '';
                if (data && data.FIRST_NAME) {
                    memberName = `${data.FIRST_NAME || ''} ${data.LAST_NAME || ''}`.trim();
                    alert(`Found member: ${memberName}`);
                } else {
                    memberName = prompt('Member not found. Enter name manually:');
                    if (!memberName) return;
                }
                
                const date = prompt('Payment Date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
                const amount = prompt('Payment Amount:');
                const method = prompt('Payment Method (Cash, Check, Card, Transfer):');
                if (!date || !amount) return;
                
                const paymentData = {
                    InvoiceID: invoiceId,
                    MemberID: memberId,
                    Name: memberName,
                    Date: date,
                    Amount: amount,
                    Method: method || '',
                    Notes: ''
                };
                
                const result = await fetch(`${API_URL}/api/accounting/payments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentData)
                });
                
                if (result.ok) {
                    alert('Payment recorded successfully!');
                    loadPayments();
                } else {
                    alert('Failed to record payment');
                }
            } catch (error) {
                console.error('Error recording payment:', error);
                alert('Error recording payment: ' + error.message);
            }
        }

        // Initial load
        loadInvoices();
        loadPayments();
        function addExpense() { alert('Add Expense functionality coming soon!'); }
        function uploadReceipt(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('receipt', file);
            fetch(`${API_URL}/api/accounting/upload-receipt`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Receipt uploaded! URL: ' + data.receiptUrl);
                    // TODO: Link receipt to expense entry in dashboard and Excel
                } else {
                    alert('Upload failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                alert('Upload error: ' + err);
            });
        }
        function addIncome() { alert('Add Income functionality coming soon!'); }
    </script>
</body>
</html>
