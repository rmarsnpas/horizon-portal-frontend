<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Contacts – Horizon House Staff</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f0f4f8; min-height:100vh; }

    header {
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:#fff; padding:18px 28px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    }
    header h1 { font-size:20px; }
    .header-nav a {
      color:#fff; text-decoration:none; font-size:13px;
      padding:7px 14px; background:rgba(255,255,255,0.2); border-radius:6px; margin-left:8px;
    }
    .header-nav a:hover { background:rgba(255,255,255,0.35); }

    .container { max-width:960px; margin:30px auto; padding:0 20px 60px; }

    .stats-bar { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
    .stat-pill {
      background:#fff; border-radius:10px; padding:14px 22px;
      box-shadow:0 2px 8px rgba(0,0,0,0.07); text-align:center; flex:1; min-width:130px;
    }
    .stat-pill .num { font-size:28px; font-weight:800; }
    .stat-pill .lbl { font-size:12px; color:#718096; margin-top:2px; }
    .stat-pill.miss .num { color:#e53e3e; }
    .stat-pill.done .num { color:#38a169; }
    .stat-pill.total .num { color:#2b6cb0; }

    .section-title {
      font-size:15px; font-weight:700; color:#4a5568;
      text-transform:uppercase; letter-spacing:.05em;
      margin:28px 0 12px;
      border-left:4px solid #e53e3e; padding-left:10px;
    }
    .section-title.done-title { border-left-color:#38a169; }

    .member-row {
      background:#fff; border-radius:10px; margin-bottom:10px;
      box-shadow:0 1px 6px rgba(0,0,0,0.07);
      border-left:5px solid #e2e8f0; overflow:hidden;
    }
    .member-row.missing   { border-left-color:#e53e3e; }
    .member-row.completed { border-left-color:#38a169; }

    .member-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; cursor:pointer; gap:10px; flex-wrap:wrap;
      user-select:none;
    }
    .member-header:hover { background:#f7fafc; }
    .member-name { font-size:16px; font-weight:700; color:#2d3748; }
    .member-meta { font-size:12px; color:#718096; margin-top:2px; }
    .badge {
      display:inline-block; padding:4px 12px; border-radius:20px;
      font-size:12px; font-weight:700; flex-shrink:0;
    }
    .badge.miss { background:#fed7d7; color:#c53030; }
    .badge.done { background:#c6f6d5; color:#276749; }
    .chevron { font-size:14px; color:#a0aec0; transition:transform .2s; flex-shrink:0; }

    .member-detail {
      display:none; padding:0 18px 18px; border-top:1px solid #f0f0f0;
    }
    .member-detail.open { display:block; }

    .contact-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-top:14px;
    }
    .contact-card {
      background:#f7fafc; border:1.5px solid #e2e8f0; border-radius:8px; padding:14px;
    }
    .contact-card h4 { font-size:14px; font-weight:700; color:#2b6cb0; margin-bottom:8px; }
    .contact-card p { font-size:13px; color:#4a5568; line-height:1.7; }
    .contact-card p strong { color:#2d3748; }

    .info-block { margin-top:14px; background:#fffbeb; border:1px solid #fbd38d; border-radius:8px; padding:12px 14px; font-size:13px; color:#744210; line-height:1.6; }
    .info-block strong { display:block; margin-bottom:4px; color:#5a3000; }

    .sig-row { margin-top:14px; font-size:12px; color:#718096; display:flex; gap:24px; flex-wrap:wrap; }
    .sig-row span strong { color:#4a5568; }

    .btn-print {
      display:inline-flex; align-items:center; gap:6px;
      margin-top:16px; padding:9px 20px;
      background:#1a3a5c; color:#fff; border:none; border-radius:7px;
      font-size:13px; font-weight:700; cursor:pointer;
    }
    .btn-print:hover { background:#0f2740; }

    .no-data { text-align:center; padding:40px; color:#a0aec0; font-size:15px; }

    .search-bar { margin-bottom:18px; }
    .search-bar input {
      width:100%; padding:11px 16px; font-size:14px;
      border:1.5px solid #e2e8f0; border-radius:8px;
      font-family:inherit; color:#2d3748;
    }
    .search-bar input:focus { outline:none; border-color:#667eea; }

    @media(max-width:600px) { .member-header { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>

<header>
  <h1>🚨 Emergency Contacts</h1>
  <nav class="header-nav">
    <a href="/staff-dashboard.html">← Admin Portal</a>
    <a href="/horizon-portal/staff-intake-portal.html">Intake Portal</a>
  </nav>
</header>

<div class="container">

  <div class="stats-bar">
    <div class="stat-pill total"><div class="num" id="statTotal">–</div><div class="lbl">Current Members</div></div>
    <div class="stat-pill done"><div class="num" id="statDone">–</div><div class="lbl">Form Completed</div></div>
    <div class="stat-pill miss"><div class="num" id="statMiss">–</div><div class="lbl">Missing Form</div></div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by member name…" oninput="applySearch()">
  </div>

  <div id="missingSection"></div>
  <div id="completedSection"></div>
  <div id="noDataMsg" class="no-data" style="display:none;">No current members found.</div>

</div>

<script>
  const API = 'https://horizon-portal-backend-production-3532.up.railway.app';

  let allRows = [];
  window._ecData = {};

  async function load() {
    const [membersRes, ecRes] = await Promise.all([
      fetch(`${API}/api/members`),
      fetch(`${API}/api/intake/emergency-contact`)
    ]);

    const members   = await membersRes.json();
    const ecRecords = await ecRes.json();

    // Build lookup: most recent submission per member (by name or ID)
    const latest = {};
    (Array.isArray(ecRecords) ? ecRecords : []).forEach(r => {
      const fn  = (r.memberInfo?.firstName || '').trim().toLowerCase();
      const ln  = (r.memberInfo?.lastName  || '').trim().toLowerCase();
      const mid = (r.memberId || '').trim().toLowerCase();
      const key = `${fn} ${ln}`.trim();
      if (key && (!latest[key] || r.submittedAt > latest[key].submittedAt)) latest[key] = r;
      if (mid && (!latest[mid] || r.submittedAt > latest[mid].submittedAt)) latest[mid] = r;
    });

    // Current members = Status 1 only
    const current = (Array.isArray(members) ? members : []).filter(m => {
      const s = String(m.STATUS || m.status || m.STATU || '').trim().toUpperCase();
      return s === '1';
    });

    // Field helpers — Excel headers may have embedded \r\n
    const getFN  = m => (m['FIRST\r\nNAME'] || m['FIRST\nNAME'] || m['FIRST NAME'] || m.firstName || m.FIRST || '').trim();
    const getLN  = m => (m['LAST\r\nNAME']  || m['LAST\nNAME']  || m['LAST NAME']  || m.lastName  || m.LAST  || '').trim();
    const getMID = m => String(m.ID || m.id || m['MEMBER ID'] || '').trim().toLowerCase();

    allRows = current.map(m => {
      const fn  = getFN(m);
      const ln  = getLN(m);
      const mid = getMID(m);
      const key = `${fn.toLowerCase()} ${ln.toLowerCase()}`.trim();
      const sub = (mid && latest[mid]) || (key && latest[key]) || null;
      return { member: m, fn, ln, mid, sub };
    }).sort((a, b) => {
      if (!a.sub && b.sub) return -1;
      if (a.sub && !b.sub) return 1;
      return a.ln.localeCompare(b.ln) || a.fn.localeCompare(b.fn);
    });

    updateStats();
    render(allRows);
  }

  function updateStats(rows) {
    const r = rows || allRows;
    const miss = r.filter(x => !x.sub).length;
    document.getElementById('statTotal').textContent = r.length;
    document.getElementById('statDone').textContent  = r.length - miss;
    document.getElementById('statMiss').textContent  = miss;
  }

  function applySearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = q ? allRows.filter(r => (r.fn + ' ' + r.ln).toLowerCase().includes(q)) : allRows;
    updateStats(filtered);
    render(filtered);
  }

  function render(rows) {
    const missing   = rows.filter(r => !r.sub);
    const completed = rows.filter(r =>  r.sub);

    document.getElementById('noDataMsg').style.display = rows.length === 0 ? 'block' : 'none';

    document.getElementById('missingSection').innerHTML = missing.length === 0 ? '' :
      `<div class="section-title">⚠️ Missing Form (${missing.length})</div>` +
      missing.map(rowHTML).join('');

    document.getElementById('completedSection').innerHTML = completed.length === 0 ? '' :
      `<div class="section-title done-title">✅ Form Completed (${completed.length})</div>` +
      completed.map(rowHTML).join('');
  }

  function rowHTML({ fn, ln, mid, sub, member }) {
    const gf  = member['M/F'] || member.GENDER || member.gender || '';
    const bed = member['BED'] || member['BED#'] || member.bed || '';
    const metaParts = [gf && `Gender: ${gf}`, bed && `Bed: ${bed}`, mid && `ID: ${mid}`].filter(Boolean);
    const metaStr = metaParts.join(' · ');

    const hasSub   = !!sub;
    const badgeCls = hasSub ? 'done'      : 'miss';
    const badgeTxt = hasSub ? '✅ Completed' : '⚠️ Missing';
    const rowCls   = hasSub ? 'completed' : 'missing';
    const safeID   = (mid || (fn + ln)).replace(/[^a-z0-9]/gi, '');
    const detailID = `det-${safeID}`;
    const chevID   = `chev-${safeID}`;
    window._ecData[detailID] = sub;

    let detail = '';
    if (hasSub) {
      const contacts = (sub.emergencyContacts || []).map(c => `
        <div class="contact-card">
          <h4>${esc(c.name)} <span style="font-weight:400;color:#718096;font-size:12px;">${esc(c.relationship)}</span></h4>
          <p>
            ${c.primaryPhone   ? `<strong>📞</strong> ${esc(c.primaryPhone)}<br>`   : ''}
            ${c.alternatePhone ? `<strong>📱</strong> ${esc(c.alternatePhone)}<br>` : ''}
            ${c.email          ? `<strong>✉️</strong> ${esc(c.email)}<br>`          : ''}
            ${c.address        ? `<strong>🏠</strong> ${esc(c.address)}`            : ''}
          </p>
        </div>`).join('');

      const medical = sub.medicalInfo        ? `<div class="info-block"><strong>Medical / Allergies</strong>${esc(sub.medicalInfo)}</div>` : '';
      const special = sub.specialInstructions ? `<div class="info-block" style="background:#ebf8ff;border-color:#90cdf4;color:#2a4365;"><strong>Special Instructions</strong>${esc(sub.specialInstructions)}</div>` : '';
      const dateStr = sub.submittedAt ? new Date(sub.submittedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : (sub.signatureDate || '');

      detail = `
        <div class="contact-grid">${contacts || '<p style="color:#a0aec0;font-size:13px;margin-top:10px;">No contacts listed.</p>'}</div>
        ${medical}${special}
        <div class="sig-row">
          <span><strong>Signed by:</strong> ${esc(sub.signature || '')}</span>
          <span><strong>Date:</strong> ${esc(dateStr)}</span>
          ${sub.source ? `<span><strong>Source:</strong> ${esc(sub.source)}</span>` : ''}
        </div>
        <div><button class="btn-print" onclick="printEC('${detailID}')">🖨️ Print / View Full Form</button></div>`;
    } else {
      detail = `<p style="color:#e53e3e;font-size:13px;margin-top:12px;">No emergency contact form has been submitted for this member. Ask them to complete it via the member portal or during intake.</p>`;
    }

    return `
      <div class="member-row ${rowCls}" id="row-${safeID}">
        <div class="member-header" onclick="toggleDetail('${detailID}','${chevID}')">
          <div>
            <div class="member-name">${esc(fn)} ${esc(ln)}</div>
            ${metaStr ? `<div class="member-meta">${metaStr}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="badge ${badgeCls}">${badgeTxt}</span>
            <span class="chevron" id="${chevID}">▼</span>
          </div>
        </div>
        <div class="member-detail" id="${detailID}">${detail}</div>
      </div>`;
  }

  function toggleDetail(detID, chevID) {
    const det  = document.getElementById(detID);
    const chev = document.getElementById(chevID);
    if (!det) return;
    const open = det.classList.toggle('open');
    if (chev) chev.style.transform = open ? 'rotate(180deg)' : '';
  }

  function printEC(detailID) {
    const sub = window._ecData[detailID];
    if (!sub) return;
    const fn = sub.memberInfo?.firstName || '';
    const ln = sub.memberInfo?.lastName  || '';
    const dateStr = sub.submittedAt
      ? new Date(sub.submittedAt).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
      : (sub.signatureDate || '');

    const contactsHTML = (sub.emergencyContacts || []).map((c, i) => {
      const rows = [
        c.primaryPhone   ? `<tr><td>Primary Phone</td><td>${esc(c.primaryPhone)}</td></tr>`   : '',
        c.alternatePhone ? `<tr><td>Alt Phone</td><td>${esc(c.alternatePhone)}</td></tr>`     : '',
        c.email          ? `<tr><td>Email</td><td>${esc(c.email)}</td></tr>`                  : '',
        c.address        ? `<tr><td>Address</td><td>${esc(c.address)}</td></tr>`              : '',
        `<tr><td>Authorized to Contact</td><td>${c.authorized !== false ? 'Yes' : 'No'}</td></tr>`
      ].join('');
      return `<div class="ec-card"><h3>Contact ${i+1}: ${esc(c.name)} <span class="rel">${esc(c.relationship)}</span></h3><table>${rows}</table></div>`;
    }).join('');

    const medHTML = sub.medicalInfo        ? `<div class="info-section"><h3>Medical / Allergies</h3><p>${esc(sub.medicalInfo)}</p></div>` : '';
    const spHTML  = sub.specialInstructions ? `<div class="info-section blue"><h3>Special Instructions</h3><p>${esc(sub.specialInstructions)}</p></div>` : '';

    const win = window.open('', '_blank', 'width=760,height=950');
    win.document.write(`<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<title>Emergency Contact – ${esc(fn)} ${esc(ln)}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; padding:32px; color:#222; }
.org { color:#1a3a5c; font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
h1 { font-size:22px; color:#1a3a5c; border-bottom:3px solid #1a3a5c; padding-bottom:8px; margin-bottom:8px; }
.sub { font-size:13px; color:#718096; margin-bottom:22px; }
.ec-card { border:1.5px solid #e2e8f0; border-radius:8px; padding:16px; margin-bottom:16px; }
.ec-card h3 { font-size:15px; color:#1a3a5c; margin-bottom:10px; }
.rel { font-weight:400; color:#718096; font-size:13px; margin-left:8px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
td { padding:6px 8px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
td:first-child { font-weight:600; color:#4a5568; width:170px; }
.info-section { background:#fffbeb; border:1px solid #fbd38d; border-radius:8px; padding:14px; margin-bottom:14px; }
.info-section.blue { background:#ebf8ff; border-color:#90cdf4; }
.info-section h3 { font-size:12px; font-weight:700; color:#5a3000; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
.info-section p { font-size:13px; color:#744210; line-height:1.6; white-space:pre-wrap; }
.info-section.blue p { color:#2a4365; }
.sig-section { margin-top:20px; border-top:2px solid #e2e8f0; padding-top:14px; display:flex; gap:40px; font-size:13px; color:#4a5568; flex-wrap:wrap; }
.sig-section strong { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#718096; margin-bottom:3px; }
.print-btn { margin-top:22px; padding:10px 24px; background:#1a3a5c; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:700; cursor:pointer; }
@media print { .print-btn { display:none; } }
</style></head><body>
<div class="org">Horizon House Recovery Center</div>
<h1>Emergency Contact Information</h1>
<div class="sub">Member: <strong>${esc(fn)} ${esc(ln)}</strong> &nbsp;&middot;&nbsp; Submitted: ${esc(dateStr)}</div>
${contactsHTML}
${medHTML}${spHTML}
<div class="sig-section">
  <div><strong>Signed By</strong>${esc(sub.signature || '')}</div>
  <div><strong>Signature Date</strong>${esc(sub.signatureDate || '')}</div>
</div>
<div><button class="print-btn" onclick="window.print()">🖨️ Print</button></div>
</body></html>`);
    win.document.close();
  }

  function esc(v) {
    return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
  }

  load();
</script>
</body>
</html>
