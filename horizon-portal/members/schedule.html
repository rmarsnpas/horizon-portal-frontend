<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule – Horizon House</title>
    <style>
        :root {
            --hh-primary: #F58634;
            --hh-gold: #E1C462;
            --hh-green: #94A880;
            --hh-bg: #FFF8F3;
            --hh-card: #ffffff;
            --hh-text: #222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--hh-bg);
            min-height: 100vh;
        }
        header {
            background: var(--hh-primary);
            color: #fff;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 22px; }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-left: 8px;
        }
        .header-nav a:hover { background: rgba(255,255,255,0.35); }
        .container { max-width: 860px; margin: 30px auto; padding: 0 20px 60px; }
        .card {
            background: var(--hh-card);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            border: 1px solid #f0e8df;
        }
        .card h2 {
            color: var(--hh-primary);
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--hh-gold);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-row.full { grid-template-columns: 1fr; }
        .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }
        label .required { color: #e53e3e; margin-left: 2px; }
        input[type="text"], input[type="date"], input[type="time"],
        select, textarea {
            padding: 10px 12px;
            border: 1.5px solid #e2d9d0;
            border-radius: 8px;
            font-size: 14px;
            color: var(--hh-text);
            background: #fafafa;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--hh-primary);
            background: #fff;
        }
        textarea { resize: vertical; min-height: 72px; }
        .days-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .day-label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1.5px solid #e2d9d0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
            user-select: none;
        }
        .day-label:hover { border-color: var(--hh-primary); background: #fff5ed; }
        .day-label input[type="checkbox"] { display: none; }
        .day-label.checked {
            background: var(--hh-primary);
            color: #fff;
            border-color: var(--hh-primary);
        }
        .schedule-type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2d9d0;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            transition: all 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            border-color: var(--hh-primary);
            background: #fff5ed;
            color: var(--hh-primary);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .btn-submit {
            background: var(--hh-primary);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #d4722a; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .alert {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }
        .alert.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }
        .alert.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; display: block; }
        .schedules-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .schedule-item {
            background: #fafafa;
            border: 1.5px solid #e2d9d0;
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .schedule-item .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .badge-IOP { background: #bee3f8; color: #2b6cb0; }
        .badge-Work { background: #c6f6d5; color: #276749; }
        .badge-Volunteering { background: #fefcbf; color: #744210; }
        .badge-Medical { background: #fed7e2; color: #97266d; }
        .badge-Court { background: #e9d8fd; color: #553c9a; }
        .badge-Meeting { background: #e6fffa; color: #234e52; }
        .badge-School { background: #ebf8ff; color: #2c5282; }
        .badge-Other { background: #edf2f7; color: #4a5568; }
        .schedule-item .details { font-size: 13px; color: #4a5568; line-height: 1.7; }
        .schedule-item .details strong { color: var(--hh-text); }
        .btn-delete {
            background: none;
            border: 1.5px solid #fca5a5;
            color: #dc2626;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-delete:hover { background: #fee2e2; }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #a0aec0;
            font-style: italic;
        }
        .loading-text { text-align: center; padding: 20px; color: #a0aec0; }
        @media (max-width: 600px) {
            .form-row, .form-row.three { grid-template-columns: 1fr; }
            header h1 { font-size: 17px; }
        }
    </style>
</head>
<body>
<header>
    <h1>📅 My Schedule</h1>
    <div class="header-nav">
        <a href="dashboard.html">← Dashboard</a>
    </div>
</header>

<div class="container">
    <div id="memberBanner" style="background: linear-gradient(135deg, var(--hh-primary) 0%, var(--hh-gold) 100%); color: white; padding: 16px 22px; border-radius: 12px; margin-bottom: 24px; display: none;">
        <strong id="memberBannerName"></strong> — <span id="memberBannerSub">Submit and manage your weekly schedule below.</span>
    </div>

    <!-- Submit New Schedule -->
    <div class="card">
        <h2>➕ Add Schedule Entry</h2>

        <div id="submitAlert" class="alert"></div>

        <div class="schedule-type-tabs">
            <button class="tab-btn active" onclick="switchTab('weekly', this)">🔁 Weekly / Recurring</button>
            <button class="tab-btn" onclick="switchTab('onetime', this)">📆 One-Time Event</button>
        </div>

        <form id="scheduleForm" onsubmit="submitSchedule(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Activity Type <span class="required">*</span></label>
                    <select id="activityType" required>
                        <option value="">— Select —</option>
                        <option value="IOP">IOP (Intensive Outpatient Program)</option>
                        <option value="Work">Work</option>
                        <option value="Volunteering">Volunteering</option>
                        <option value="Medical">Medical / Dental</option>
                        <option value="Court">Court / Legal</option>
                        <option value="Meeting">AA / NA Meeting</option>
                        <option value="School">School / GED</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location / Address</label>
                    <input type="text" id="location" placeholder="e.g., ABC Treatment Center, 123 Main St">
                </div>
            </div>

            <div class="form-row three">
                <div class="form-group">
                    <label>Start Time <span class="required">*</span></label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>End Time <span class="required">*</span></label>
                    <input type="time" id="endTime" required>
                </div>
                <div class="form-group" style="visibility: hidden;" id="placeholderCol">
                    <!-- spacer -->
                </div>
            </div>

            <!-- Weekly Tab -->
            <div id="tab-weekly" class="tab-panel active">
                <div class="form-row">
                    <div class="form-group">
                        <label>Effective Start Date</label>
                        <input type="date" id="effectiveStart">
                    </div>
                    <div class="form-group">
                        <label>Effective End Date <span style="color:#a0aec0; font-weight:400;">(optional)</span></label>
                        <input type="date" id="effectiveEnd">
                    </div>
                </div>
                <div class="form-group">
                    <label>Days of Week <span class="required">*</span></label>
                    <div class="days-checkboxes" id="daysCheckboxes">
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Monday">Monday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Tuesday">Tuesday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Wednesday">Wednesday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Thursday">Thursday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Friday">Friday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Saturday">Saturday</label>
                        <label class="day-label" onclick="toggleDay(this)"><input type="checkbox" value="Sunday">Sunday</label>
                    </div>
                </div>
            </div>

            <!-- One-Time Tab -->
            <div id="tab-onetime" class="tab-panel">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date <span class="required">*</span></label>
                        <input type="date" id="oneTimeDate">
                    </div>
                </div>
            </div>

            <div class="form-row full" style="margin-top: 8px;">
                <div class="form-group">
                    <label>Notes <span style="color:#a0aec0; font-weight:400;">(optional)</span></label>
                    <textarea id="notes" placeholder="Any additional details..."></textarea>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-submit" id="submitBtn">Submit Schedule Entry</button>
            </div>
        </form>
    </div>

    <!-- My Current Schedules -->
    <div class="card">
        <h2>📋 My Submitted Schedules</h2>
        <div id="mySchedulesLoading" class="loading-text">Loading...</div>
        <ul id="mySchedulesList" class="schedules-list" style="display:none;"></ul>
    </div>
</div>

<script>
    const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
    const urlParams = new URLSearchParams(window.location.search);
    const memberId = urlParams.get('id') || localStorage.getItem('memberId');
    let memberName = localStorage.getItem('memberFirstName')
        ? `${localStorage.getItem('memberFirstName')} ${localStorage.getItem('memberLastName')}`.trim()
        : '';

    let activeTab = 'weekly';

    // Show member banner
    if (memberId) {
        document.getElementById('memberBanner').style.display = 'block';
        document.getElementById('memberBannerName').textContent = memberName || `Member #${memberId}`;
        // If no cached name, fetch it
        if (!memberName) {
            fetch(`${API_BASE}/api/getMember?id=${encodeURIComponent(memberId)}`)
                .then(r => r.json())
                .then(data => {
                    if (data) {
                        const fn = data.FIRST_NAME || data['FIRST\r\nNAME'] || '';
                        const ln = data.LAST_NAME || data['LAST\r\nNAME'] || '';
                        memberName = `${fn} ${ln}`.trim();
                        document.getElementById('memberBannerName').textContent = memberName || `Member #${memberId}`;
                    }
                }).catch(() => {});
        }
    }

    function switchTab(tab, el) {
        activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
    }

    function toggleDay(label) {
        // setTimeout so checkbox is toggled before we read it
        setTimeout(() => {
            const cb = label.querySelector('input[type="checkbox"]');
            if (cb.checked) {
                label.classList.add('checked');
            } else {
                label.classList.remove('checked');
            }
        }, 0);
    }

    function showAlert(msg, type) {
        const el = document.getElementById('submitAlert');
        el.textContent = msg;
        el.className = 'alert ' + type;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function submitSchedule(e) {
        e.preventDefault();

        if (!memberId) {
            showAlert('You must be logged in to submit a schedule.', 'error');
            return;
        }

        const type = document.getElementById('activityType').value;
        const location = document.getElementById('location').value.trim();
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        const notes = document.getElementById('notes').value.trim();

        if (!type || !startTime || !endTime) {
            showAlert('Please fill in all required fields.', 'error');
            return;
        }

        let payload = {
            memberId: String(memberId),
            memberName: memberName || `Member #${memberId}`,
            type,
            location,
            startTime,
            endTime,
            notes,
            scheduleType: activeTab
        };

        if (activeTab === 'weekly') {
            const days = Array.from(document.querySelectorAll('#daysCheckboxes input:checked')).map(cb => cb.value);
            if (days.length === 0) {
                showAlert('Please select at least one day of the week.', 'error');
                return;
            }
            payload.days = days;
            payload.effectiveStart = document.getElementById('effectiveStart').value || null;
            payload.effectiveEnd = document.getElementById('effectiveEnd').value || null;
        } else {
            const date = document.getElementById('oneTimeDate').value;
            if (!date) {
                showAlert('Please select a date for the one-time event.', 'error');
                return;
            }
            payload.date = date;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        try {
            const res = await fetch(`${API_BASE}/api/schedules`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if (result.success) {
                showAlert('✅ Schedule entry submitted successfully!', 'success');
                document.getElementById('scheduleForm').reset();
                document.querySelectorAll('.day-label').forEach(l => l.classList.remove('checked'));
                loadMySchedules();
            } else {
                showAlert('Error: ' + (result.error || 'Failed to submit.'), 'error');
            }
        } catch (err) {
            showAlert('Connection error. Please try again.', 'error');
        }

        btn.disabled = false;
        btn.textContent = 'Submit Schedule Entry';
    }

    async function loadMySchedules() {
        if (!memberId) {
            document.getElementById('mySchedulesLoading').textContent = 'Please log in to view your schedules.';
            return;
        }

        document.getElementById('mySchedulesLoading').style.display = 'block';
        document.getElementById('mySchedulesList').style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/schedules?memberId=${encodeURIComponent(memberId)}`);
            const data = await res.json();
            const schedules = data.schedules || [];

            document.getElementById('mySchedulesLoading').style.display = 'none';
            const list = document.getElementById('mySchedulesList');
            list.style.display = 'flex';

            if (schedules.length === 0) {
                list.innerHTML = '<li class="empty-state">No schedule entries submitted yet.</li>';
                return;
            }

            list.innerHTML = schedules.map(s => buildScheduleCard(s)).join('');
        } catch (err) {
            document.getElementById('mySchedulesLoading').textContent = 'Error loading schedules.';
        }
    }

    function buildScheduleCard(s) {
        const badgeClass = 'badge-' + (s.type || 'Other').replace(/[^a-zA-Z]/g, '');
        let timeStr = `${fmtTime(s.startTime)} – ${fmtTime(s.endTime)}`;
        let recurrenceStr = '';
        if (s.scheduleType === 'weekly' && s.days) {
            recurrenceStr = `<strong>Days:</strong> ${s.days.join(', ')}`;
            if (s.effectiveStart) recurrenceStr += ` &nbsp;|&nbsp; <strong>From:</strong> ${fmtDate(s.effectiveStart)}`;
            if (s.effectiveEnd) recurrenceStr += ` &nbsp;|&nbsp; <strong>Until:</strong> ${fmtDate(s.effectiveEnd)}`;
        } else if (s.scheduleType === 'onetime' && s.date) {
            recurrenceStr = `<strong>Date:</strong> ${fmtDate(s.date)}`;
        }
        const locationStr = s.location ? `<strong>Location:</strong> ${s.location}` : '';
        const notesStr = s.notes ? `<strong>Notes:</strong> ${s.notes}` : '';
        const submittedStr = `<span style="color:#a0aec0; font-size:11px;">Submitted ${fmtDateTime(s.submittedAt)}</span>`;

        return `
            <li class="schedule-item">
                <div>
                    <span class="type-badge ${badgeClass}">${s.type}</span>
                    <div class="details">
                        <div><strong>Time:</strong> ${timeStr}</div>
                        ${recurrenceStr ? `<div>${recurrenceStr}</div>` : ''}
                        ${locationStr ? `<div>${locationStr}</div>` : ''}
                        ${notesStr ? `<div>${notesStr}</div>` : ''}
                        <div>${submittedStr}</div>
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteSchedule('${s.id}')">🗑 Delete</button>
            </li>
        `;
    }

    async function deleteSchedule(id) {
        if (!confirm('Delete this schedule entry?')) return;
        try {
            const res = await fetch(`${API_BASE}/api/schedules/${encodeURIComponent(id)}`, { method: 'DELETE' });
            const result = await res.json();
            if (result.success) {
                loadMySchedules();
            } else {
                alert('Error deleting: ' + (result.error || 'Unknown error'));
            }
        } catch (err) {
            alert('Connection error.');
        }
    }

    function fmtTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        const hr = h % 12 || 12;
        return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function fmtDate(d) {
        if (!d) return '';
        const [y, mo, da] = d.split('-');
        return `${mo}/${da}/${y}`;
    }

    function fmtDateTime(iso) {
        if (!iso) return '';
        const dt = new Date(iso);
        if (isNaN(dt)) return iso;
        return dt.toLocaleDateString('en-US') + ' ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    // Set today as default for one-time date and effective start
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('oneTimeDate').value = today;
    document.getElementById('effectiveStart').value = today;

    loadMySchedules();
</script>
</body>
</html>
