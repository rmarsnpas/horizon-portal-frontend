<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorandums – Horizon House</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF8F3; margin: 0; min-height: 100vh; }
        header { background: #F58634; color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 20px; margin: 0; }
        .btn-back { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.35); }
        .container { max-width: 760px; margin: 36px auto; padding: 0 20px 60px; }
        .page-title { font-size: 1.4rem; font-weight: 700; color: #2b3440; margin-bottom: 6px; }
        .page-sub { color: #888; font-size: 0.93rem; margin-bottom: 28px; }

        /* ── Memo card ── */
        .memo-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border: 1px solid #ede0d4;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .memo-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 16px 22px 12px;
        }
        .memo-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #F58634;
            margin-bottom: 6px;
        }
        .memo-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 8px; }
        .memo-meta { font-size: 12px; color: rgba(255,255,255,0.65); display: flex; gap: 18px; flex-wrap: wrap; }
        .memo-body {
            padding: 20px 22px 22px;
            font-size: 0.95rem;
            color: #2b3440;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .memo-footer {
            padding: 10px 22px 14px;
            border-top: 1px solid #f0e8df;
            font-size: 12px;
            color: #999;
            text-align: right;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .loading { text-align: center; padding: 60px 20px; color: #aaa; }
    </style>
</head>
<body>

<header>
    <h1>📋 Management Memorandums</h1>
    <a class="btn-back" href="dashboard.html">← Dashboard</a>
</header>

<div class="container">
    <div class="page-title">Memorandums from Management</div>
    <div class="page-sub">Official communications posted by Horizon House management.</div>
    <div id="memoContainer"><div class="loading">Loading…</div></div>
</div>

<script>
    const API = 'https://horizon-portal-backend-production-3532.up.railway.app';

    // Redirect to login if not signed in
    if (!localStorage.getItem('memberId')) {
        window.location.href = 'dashboard.html';
    }

    function fmtDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadMemos() {
        const container = document.getElementById('memoContainer');
        try {
            const res = await fetch(`${API}/api/memorandums`);
            const memos = await res.json();
            if (!Array.isArray(memos) || memos.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No memorandums have been posted yet.</p></div>`;
                return;
            }
            container.innerHTML = memos.map(m => `
                <div class="memo-card">
                    <div class="memo-header">
                        <div class="memo-label">Memorandum</div>
                        <div class="memo-title">${escHtml(m.title)}</div>
                        <div class="memo-meta">
                            <span>📅 ${fmtDate(m.timestamp)}</span>
                            <span>✍️ ${escHtml(m.from)}</span>
                        </div>
                    </div>
                    <div class="memo-body">${escHtml(m.body)}</div>
                    <div class="memo-footer">Posted ${fmtDate(m.timestamp)}</div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load memorandums. Please try again later.</p></div>`;
        }
    }

    function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadMemos();
</script>
</body>
</html>
