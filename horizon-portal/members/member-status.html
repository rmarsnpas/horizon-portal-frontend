<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Status - Horizon House</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #718096;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .stat-box.in {
            border-left: 4px solid #28a745;
        }

        .stat-box.out {
            border-left: 4px solid #ff9800;
        }

        .stat-box.overdue {
            border-left: 4px solid #dc3545;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .member-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .member-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .member-card.female {
            background: #ffe6f0;
        }

        .member-card.male {
            background: #e6f3ff;
        }

        .member-card.in {
            border-left: 5px solid #28a745;
        }

        .member-card.out {
            border-left: 5px solid #ffa500;
        }

        .member-card.overdue {
            border-left: 5px solid #dc3545;
        }

        .member-card.overdue.female {
            background: #ffc0cb;
        }

        .member-card.overdue.male {
            background: #b3d9ff;
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .member-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2d3748;
            flex: 1;
        }

        .member-id {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .member-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 10px;
        }

        .member-status.in {
            background: #28a745;
            color: white;
        }

        .member-status.out {
            background: #ffd700;
            color: #7d6608;
        }

        .member-status.overdue {
            background: #f8d7da;
            color: #721c24;
        }

        .member-details {
            margin-top: 12px;
            font-size: 0.85em;
            color: #4a5568;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 10px;
        }

        .member-details div {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-details .label {
            font-weight: 600;
            color: #2d3748;
        }

        .member-details .value {
            color: #4a5568;
        }

        .member-info {
            margin-top: 8px;
            font-size: 0.85em;
            color: #4a5568;
        }

        .member-info div {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .member-info .label {
            font-weight: 600;
            color: #2d3748;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            color: #718096;
        }

        @media (max-width: 768px) {
            .members-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Member Status Board</h1>
            <p>Current in/out status of all active members</p>
            <div class="nav-links">
                <a href="sign-inout-history.html">📋 View History</a>
                <a href="../../staff-dashboard.html">← Back to Dashboard</a>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-box in">
                <div class="stat-number" id="totalIn">-</div>
                <div class="stat-label">Signed In</div>
            </div>
            <div class="stat-box out">
                <div class="stat-number" id="totalOut">-</div>
                <div class="stat-label">Signed Out</div>
            </div>
            <div class="stat-box overdue">
                <div class="stat-number" id="totalOverdue">-</div>
                <div class="stat-label">Overdue</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalMembers">-</div>
                <div class="stat-label">Total Active</div>
            </div>
        </div>

        <div id="loading" class="loading">Loading member status...</div>
        <div id="membersGrid" class="members-grid" style="display: none;"></div>
    </div>

    <script>
        // const API_BASE = 'http://localhost:3001';
        const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';

        async function loadMemberStatus() {
            try {
                // Get all active members (status = 1)
                const membersResponse = await fetch(`${API_BASE}/api/members`);
                const allMembers = await membersResponse.json();
                
                console.log('Total members loaded:', allMembers.length);
                console.log('First 5 members:', allMembers.slice(0, 5));
                
                // Filter to only active members (status 1)
                const activeMembers = allMembers.filter(m => {
                    const status = m.STATU || m.STATUS || m.STATU;
                    const isActive = status === 1 || status === '1';
                    return isActive;
                });
                
                console.log('Active members (status=1):', activeMembers.length);
                console.log('First active member sample:', activeMembers[0]);
                console.log('Excel data check (with \\r\\n line breaks):', activeMembers.slice(0,3).map(m => ({
                    id: m.ID,
                    name: `${m['FIRST\r\nNAME'] || m.FIRST_NAME || ''} ${m['LAST\r\nNAME'] || m.LAST_NAME || ''}`,
                    admitDate_H: m['ADMIT\r\nDATE'],
                    dob_P: m.DOB,
                    soberDate_Q: m['SOBER\r\nDATE'],
                    soberDays_R: m['DAYS\r\nSOBER'],
                    gender: m['M/F'],
                    bed: m.BED,
                    phone: m.PHONE,
                    email: m.EMAIL
                })));
                
                // Get current sign-out status
                const statusResponse = await fetch(`${API_BASE}/api/signInOut/current`);
                const statusData = await statusResponse.json();
                const membersOut = statusData.membersOut || [];
                
                // Create lookup map for signed out members
                const outMap = {};
                membersOut.forEach(m => {
                    outMap[m.memberId] = m;
                });
                
                // Helper function to convert Excel serial date to JavaScript Date
                function excelDateToJSDate(serial) {
                    if (!serial || serial === '') return null;
                    if (typeof serial === 'string') return serial; // Already a date string
                    // Excel serial date: days since 1/1/1900 (with 1900 leap year bug)
                    const utc_days = Math.floor(serial - 25569);
                    const utc_value = utc_days * 86400;
                    const date_info = new Date(utc_value * 1000);
                    return date_info;
                }

                // Helper function to format date as mm/dd/yyyy
                function formatDate(dateStr) {
                    if (!dateStr || dateStr === '') return '';
                    
                    let date;
                    // Check if it's an Excel serial number
                    if (typeof dateStr === 'number') {
                        date = excelDateToJSDate(dateStr);
                    } else {
                        date = new Date(dateStr);
                    }
                    
                    if (!date || isNaN(date.getTime())) return '';
                    
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const year = date.getFullYear();
                    return `${month}/${day}/${year}`;
                }

                // Helper function to calculate days sober
                function calculateSoberDays(sobrietyDate) {
                    if (!sobrietyDate || sobrietyDate === '') return '';
                    
                    let date;
                    // Check if it's an Excel serial number
                    if (typeof sobrietyDate === 'number') {
                        date = excelDateToJSDate(sobrietyDate);
                    } else {
                        date = new Date(sobrietyDate);
                    }
                    
                    if (!date || isNaN(date.getTime())) return '';
                    
                    const today = new Date();
                    const diffTime = Math.abs(today - date);
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    return diffDays;
                }

                // Count stats
                let totalIn = 0;
                let totalOut = 0;
                let totalOverdue = 0;
                
                // Build member cards
                const grid = document.getElementById('membersGrid');
                grid.innerHTML = activeMembers.map(member => {
                    const memberId = String(member.ID);
                    // Excel headers have \r\n line breaks
                    const firstName = member['FIRST\r\nNAME'] || member.FIRST_NAME || member['FIRST\nNAME'] || '';
                    const lastName = member['LAST\r\nNAME'] || member.LAST_NAME || member['LAST\nNAME'] || '';
                    const memberName = `${firstName} ${lastName}`.trim() || 'Unknown';
                    
                    // Extract additional member info (Excel columns with \r\n line breaks in headers)
                    const gender = member['M/F'] || member.GENDER || member.SEX || '';
                    const dob = member.DOB || member['DATE OF BIRTH'] || member.BIRTHDATE || '';
                    const sobrietyDate = member['SOBER\r\nDATE'] || member['SOBRIETY DATE'] || member['SOBER DATE'] || '';
                    const email = member.EMAIL || member['E-MAIL'] || member.EMAILADDRESS || '';
                    const phone = member.PHONE || member['PHONE NUMBER'] || member.PHONENUMBER || member.CELL || '';
                    const bed = member.BED || member['BED#'] || member['BED NUMBER'] || member.BEDNUMBER || member.ROOM || '';
                    const admitDate = member['ADMIT\r\nDATE'] || member['ADMIT DATE'] || member['ADMIT DAT'] || '';
                    
                    // Get sober days - Excel column header has \r\n
                    let soberDays = member['DAYS\r\nSOBER'] || member['SOBER DAYS'] || member['DAYS SOBER'] || '';
                    // Only calculate if Excel value is empty/missing
                    if (!soberDays || soberDays === '' || String(soberDays).trim() === '') {
                        soberDays = calculateSoberDays(sobrietyDate);
                    }
                    
                    // Determine gender class for background color (pink for F, baby blue for M)
                    const genderClass = gender.toUpperCase() === 'F' || gender.toUpperCase() === 'FEMALE' ? 'female' : 
                                       gender.toUpperCase() === 'M' || gender.toUpperCase() === 'MALE' ? 'male' : '';
                    
                    const outInfo = outMap[memberId];
                    const isOut = !!outInfo;
                    const isOverdue = outInfo && outInfo.isOverdue;
                    
                    if (isOut) {
                        totalOut++;
                        if (isOverdue) totalOverdue++;
                    } else {
                        totalIn++;
                    }
                    
                    let statusClass = isOverdue ? 'overdue' : (isOut ? 'out' : 'in');
                    let statusText = isOverdue ? '🚨 OVERDUE' : (isOut ? '🚪 Signed Out' : '✅ Signed In');
                    
                    // Build member info section with reordered details (Admit, DOB, Sober Date, Days Sober)
                    const formattedAdmitDate = formatDate(admitDate);
                    const formattedDOB = formatDate(dob);
                    const formattedSoberDate = formatDate(sobrietyDate);
                    
                    let memberInfoHtml = `
                        <div class="member-info">
                            ${formattedAdmitDate ? `<div><span class="label">Admitted:</span> <span>${formattedAdmitDate}</span></div>` : ''}
                            ${formattedDOB ? `<div><span class="label">DOB:</span> <span>${formattedDOB}</span></div>` : ''}
                            ${formattedSoberDate ? `<div><span class="label">Sober Since:</span> <span>${formattedSoberDate}</span></div>` : ''}
                            ${soberDays && String(soberDays).trim() !== '' ? `<div><span class="label">Days Sober:</span> <span style="color: #28a745; font-weight: 700;">${soberDays} days 🌟</span></div>` : ''}
                            ${bed && String(bed).trim() !== '' ? `<div><span class="label">Bed:</span> <span>${bed}</span></div>` : ''}
                            ${phone && String(phone).trim() !== '' ? `<div><span class="label">Phone:</span> <span>${phone}</span></div>` : ''}
                            ${email && String(email).trim() !== '' ? `<div><span class="label">Email:</span> <span style="font-size: 0.75em; word-break: break-all;">${email}</span></div>` : ''}
                        </div>
                    `;
                    
                    let detailsHtml = '';
                    if (isOut) {
                        detailsHtml = `
                            <div class="member-details">
                                <div><span class="label">📅 Date:</span> <span class="value">${outInfo.date}</span></div>
                                <div><span class="label">📍 Location:</span> <span class="value">${outInfo.destination}</span></div>
                                <div><span class="label">🕐 Left At:</span> <span class="value">${outInfo.timeOut}</span></div>
                                <div><span class="label">⏰ Return:</span> <span class="value">${outInfo.estimatedReturn}</span></div>
                            </div>
                        `;
                    }
                    
                    return `
                        <div class="member-card ${statusClass} ${genderClass}">
                            <div class="member-header">
                                <div>
                                    <div class="member-name">${memberName}</div>
                                    <div class="member-id">ID: ${memberId}</div>
                                </div>
                                <span class="member-status ${statusClass}">${statusText}</span>
                            </div>
                            ${memberInfoHtml}
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
                
                // Update stats
                document.getElementById('totalIn').textContent = totalIn;
                document.getElementById('totalOut').textContent = totalOut;
                document.getElementById('totalOverdue').textContent = totalOverdue;
                document.getElementById('totalMembers').textContent = activeMembers.length;
                
                // Show grid
                document.getElementById('loading').style.display = 'none';
                grid.style.display = 'grid';
                
            } catch (error) {
                console.error('Error loading member status:', error);
                document.getElementById('loading').innerHTML = '<div style="color: #dc3545;">Error loading member status</div>';
            }
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadMemberStatus);
        
        // Auto-refresh every 30 seconds
        setInterval(loadMemberStatus, 30000);
    </script>
</body>
</html>
