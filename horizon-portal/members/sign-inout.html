<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In/Out - Horizon House</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="time"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="time"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #48bb78;
            color: white;
            width: 100%;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .status-message {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        .current-status {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #e53e3e;
        }

        .status-card.in-house {
            border-left-color: #48bb78;
        }

        .status-card h3 {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .status-info {
            font-size: 13px;
            color: #4a5568;
            margin: 4px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-badge.out {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-badge.in {
            background: #c6f6d5;
            color: #22543d;
        }

        .section-title {
            color: #2d3748;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }

        #loginOverlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        #loginBox {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 340px; text-align: center;
        }
        #loginBox h2 { color: #2d3748; margin-bottom: 8px; }
        #loginBox p { color: #718096; font-size: 14px; margin-bottom: 24px; }
        #loginBox input {
            width: 100%; padding: 10px; border: 1px solid #cbd5e0;
            border-radius: 6px; font-size: 16px; margin-bottom: 12px;
        }
        #loginError { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }
        .name-hint { font-size: 12px; color: #48bb78; margin-top: 3px; min-height: 16px; }

        /* Invoice due notification banner */
        @keyframes flash-green {
            0%, 100% { background: #c6f6d5; border-color: #38a169; box-shadow: 0 0 0 0 rgba(56,161,105,0.4); }
            50% { background: #9ae6b4; border-color: #276749; box-shadow: 0 0 0 8px rgba(56,161,105,0); }
        }
        @keyframes flash-yellow {
            0%, 100% { background: #fefcbf; border-color: #d69e2e; box-shadow: 0 0 0 0 rgba(214,158,46,0.4); }
            50% { background: #faf089; border-color: #b7791f; box-shadow: 0 0 0 8px rgba(214,158,46,0); }
        }
        @keyframes flash-red {
            0%, 100% { background: #fed7d7; border-color: #e53e3e; box-shadow: 0 0 0 0 rgba(229,62,62,0.5); }
            50% { background: #fc8181; border-color: #9b2c2c; box-shadow: 0 0 0 10px rgba(229,62,62,0); }
        }
        .invoice-alert {
            display: none;
            padding: 18px 24px;
            border-radius: 10px;
            border: 3px solid;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.01em;
        }
        .invoice-alert a {
            font-weight: 700;
            text-decoration: underline;
            margin-left: 10px;
        }
        .invoice-alert.flash-green { animation: flash-green 1.2s ease-in-out infinite; color: #22543d; }
        .invoice-alert.flash-green a { color: #22543d; }
        .invoice-alert.flash-yellow { animation: flash-yellow 0.9s ease-in-out infinite; color: #744210; }
        .invoice-alert.flash-yellow a { color: #744210; }
        .invoice-alert.flash-red { animation: flash-red 0.6s ease-in-out infinite; color: #742a2a; }
        .invoice-alert.flash-red a { color: #742a2a; }
    </style>
</head>
<body>
    <!-- Staff Login Overlay -->
    <div id="loginOverlay">
        <div id="loginBox">
            <h2>🔒 Staff Access</h2>
            <p>This page is for staff corrections only</p>
            <input type="password" id="staffPwInput" placeholder="Staff password" onkeydown="if(event.key==='Enter')checkStaffLogin()">
            <button class="btn btn-primary" onclick="checkStaffLogin()" style="width:100%;">Log In</button>
            <div id="loginError">Incorrect password</div>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <!-- Invoice due notification banner -->
        <div id="invoiceAlert" class="invoice-alert" role="alert"></div>

        <div class="header">
            <h1>🏠 Manual Sign In/Out</h1>
            <p>Staff corrections &amp; manual entries</p>
            <div class="nav-links">
                <a href="sign-inout-history.html">View History</a>
                <a href="../../staff-dashboard.html">Staff Dashboard</a>
                <a href="/">Home</a>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">Current Status - Members Out of House</h2>
            <div id="currentStatus" class="current-status">
                <div class="empty-state">Loading...</div>
            </div>
        </div>

        <div class="grid-2col">
            <div class="card">
                <h2>Sign Out</h2>
                <form id="signOutForm">
                    <div class="form-group">
                        <label for="memberIdOut">Member ID *</label>
                        <input type="text" id="memberIdOut" name="memberId" required oninput="lookupName('memberIdOut','memberNameOut','hintOut')">
                        <div class="name-hint" id="hintOut"></div>
                    </div>
                    <div class="form-group">
                        <label for="memberNameOut">Member Name *</label>
                        <input type="text" id="memberNameOut" name="memberName" required>
                    </div>
                    <div class="form-group">
                        <label for="destination">Destination *</label>
                        <input type="text" id="destination" name="destination" required placeholder="e.g., Doctor appointment, Work, Grocery store">
                    </div>
                    <div class="form-group">
                        <label for="dateOut">Date *</label>
                        <input type="date" id="dateOut" name="dateOut" required>
                    </div>
                    <div class="form-group">
                        <label for="timeOut">Time Out *</label>
                        <input type="time" id="timeOut" name="timeOut" required>
                    </div>
                    <div class="form-group">
                        <label for="estimatedReturn">Estimated Return Time *</label>
                        <input type="time" id="estimatedReturn" name="estimatedReturn" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Out</button>
                    <div id="signOutStatus" class="status-message"></div>
                </form>
            </div>

            <div class="card">
                <h2>Sign In</h2>
                <form id="signInForm">
                    <div class="form-group">
                        <label for="memberIdIn">Member ID *</label>
                        <input type="text" id="memberIdIn" name="memberId" required oninput="lookupName('memberIdIn','memberNameIn','hintIn')">
                        <div class="name-hint" id="hintIn"></div>
                    </div>
                    <div class="form-group">
                        <label for="memberNameIn">Member Name *</label>
                        <input type="text" id="memberNameIn" name="memberName" required>
                    </div>
                    <div class="form-group">
                        <label for="dateIn">Date *</label>
                        <input type="date" id="dateIn" name="dateIn" required>
                    </div>
                    <div class="form-group">
                        <label for="timeIn">Actual Time In *</label>
                        <input type="time" id="timeIn" name="timeIn" required>
                    </div>
                    <button type="submit" class="btn btn-success">Sign In</button>
                    <div id="signInStatus" class="status-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // const API_BASE = 'http://localhost:3001';
        const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
        const STAFF_PASSWORD = 'house2026';

        function checkStaffLogin() {
            const val = document.getElementById('staffPwInput').value;
            if (val === STAFF_PASSWORD) {
                sessionStorage.setItem('horizonStaffAuth', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = '';
                setCurrentTime();
                loadCurrentStatus();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Check if already authenticated
        if (sessionStorage.getItem('horizonStaffAuth') === 'true') {
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = '';
            });
        }

        let _membersCache = null;
        async function getMembersCache() {
            if (_membersCache) return _membersCache;
            try {
                const res = await fetch(`${API_BASE}/api/members`);
                _membersCache = await res.json();
            } catch(e) { _membersCache = []; }
            return _membersCache;
        }

        let _lookupTimers = {};
        function lookupName(idField, nameField, hintField) {
            clearTimeout(_lookupTimers[idField]);
            _lookupTimers[idField] = setTimeout(async () => {
                const id = document.getElementById(idField).value.trim();
                const hint = document.getElementById(hintField);
                if (!id) { hint.textContent = ''; hideInvoiceAlert(); return; }
                const members = await getMembersCache();
                const normId = s => String(s).trim().replace(/^0+/, '') || '0';
                const m = members.find(x => {
                    const stored = String(x.ID).trim();
                    return stored === id || normId(stored) === normId(id);
                });
                if (m) {
                    const first = (m['FIRST\r\nNAME'] || m['FIRST\nNAME'] || m.FIRST_NAME || '').trim();
                    const last  = (m['LAST\r\nNAME']  || m['LAST\nNAME']  || m.LAST_NAME  || '').trim();
                    const name  = `${first} ${last}`.trim();
                    if (name) {
                        document.getElementById(nameField).value = name;
                        hint.textContent = '✓ ' + name;
                    } else {
                        hint.textContent = '';
                    }
                    const memberRef = String(m.REF || m.ref || '').trim().toUpperCase();
                    if (memberRef !== 'H') checkInvoiceDue(id);
                    else hideInvoiceAlert();
                } else {
                    hint.textContent = id.length >= 2 ? 'ID not found' : '';
                    hideInvoiceAlert();
                }
            }, 400);
        }

        // ── Invoice due notifications ───────────────────────────────────────
        let _invoicesCache = null;
        async function getInvoicesCache() {
            if (_invoicesCache) return _invoicesCache;
            try {
                const res = await fetch('../invoices/invoices.json?t=' + Date.now(), { cache: 'no-store' });
                const data = await res.json();
                _invoicesCache = data.invoices || [];
            } catch (e) { _invoicesCache = []; }
            return _invoicesCache;
        }

        function showInvoiceAlert(cls, msg, memberId) {
            const el = document.getElementById('invoiceAlert');
            el.className = 'invoice-alert ' + cls;
            el.innerHTML = '&#x26A0;&#xFE0F; ' + msg +
                ' <a href="invoices.html?id=' + encodeURIComponent(memberId) + '">View Invoice &rarr;</a>';
            el.style.display = 'block';
        }

        function hideInvoiceAlert() {
            const el = document.getElementById('invoiceAlert');
            el.style.display = 'none';
            el.className = 'invoice-alert';
        }

        async function checkInvoiceDue(memberId) {
            const invoices = await getInvoicesCache();
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const unpaid = invoices.filter(inv =>
                String(inv.memberId) === String(memberId) &&
                inv.status === 'unpaid' &&
                inv.dueDate
            );

            if (unpaid.length === 0) { hideInvoiceAlert(); return; }

            // Find the most urgent invoice (smallest days-until-due)
            let minDays = Infinity;
            for (const inv of unpaid) {
                const parts = inv.dueDate.split('-'); // MM-DD-YYYY
                const due = new Date(parseInt(parts[2]), parseInt(parts[0]) - 1, parseInt(parts[1]));
                const days = Math.round((due - today) / 86400000);
                if (days < minDays) minDays = days;
            }

            if (minDays === 3) {
                showInvoiceAlert('flash-green',
                    'You have an invoice due in 3 days \u2014 please review it on your Member Portal.',
                    memberId);
            } else if (minDays === 2 || minDays === 1) {
                showInvoiceAlert('flash-yellow',
                    'Your invoice is due in ' + minDays + ' day' + (minDays !== 1 ? 's' : '') +
                    ' \u2014 please review it on your Member Portal.',
                    memberId);
            } else if (minDays === 0) {
                showInvoiceAlert('flash-red',
                    'Your invoice is DUE TODAY \u2014 please review it on your Member Portal immediately.',
                    memberId);
            } else if (minDays < 0) {
                const over = Math.abs(minDays);
                showInvoiceAlert('flash-red',
                    'Your invoice is OVERDUE by ' + over + ' day' + (over !== 1 ? 's' : '') +
                    ' \u2014 please review it on your Member Portal immediately.',
                    memberId);
            } else {
                hideInvoiceAlert();
            }
        }

        let currentMember = null;

        // Load logged-in member info
        async function loadMemberInfo() {
            const memberId = localStorage.getItem('memberId');
            if (!memberId) {
                console.warn('No member logged in');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/getMember?id=${encodeURIComponent(memberId)}`);
                if (response.ok) {
                    const data = await response.json();
                    currentMember = {
                        id: data.ID,
                        firstName: data.FIRST_NAME,
                        lastName: data.LAST_NAME,
                        fullName: `${data.FIRST_NAME} ${data.LAST_NAME}`
                    };

                    // Auto-populate forms
                    document.getElementById('memberIdOut').value = currentMember.id;
                    document.getElementById('memberNameOut').value = currentMember.fullName;
                    document.getElementById('memberIdIn').value = currentMember.id;
                    document.getElementById('memberNameIn').value = currentMember.fullName;

                    // Make fields read-only
                    document.getElementById('memberIdOut').readOnly = true;
                    document.getElementById('memberNameOut').readOnly = true;
                    document.getElementById('memberIdIn').readOnly = true;
                    document.getElementById('memberNameIn').readOnly = true;

                    // Style read-only fields
                    const style = 'background-color: #f7fafc; cursor: not-allowed;';
                    document.getElementById('memberIdOut').style.cssText = style;
                    document.getElementById('memberNameOut').style.cssText = style;
                    document.getElementById('memberIdIn').style.cssText = style;
                    document.getElementById('memberNameIn').style.cssText = style;
                }
            } catch (error) {
                console.error('Error loading member info:', error);
            }
        }

        // Set default times and dates
        function setCurrentTime() {
            const now = new Date();
            const timeStr = now.toTimeString().slice(0, 5);
            const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD for input[type=date]
            document.getElementById('timeOut').value = timeStr;
            document.getElementById('timeIn').value = timeStr;
            document.getElementById('dateOut').value = dateStr;
            document.getElementById('dateIn').value = dateStr;
        }

        // Load current status
        async function loadCurrentStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/signInOut/current`);
                const data = await response.json();

                const container = document.getElementById('currentStatus');
                
                if (!data.membersOut || data.membersOut.length === 0) {
                    container.innerHTML = '<div class="empty-state">✓ All members are currently in the house</div>';
                    return;
                }

                container.innerHTML = data.membersOut.map(member => `
                    <div class="status-card">
                        <span class="status-badge out">OUT</span>
                        <h3>${member.memberName}</h3>
                        <div class="status-info"><strong>ID:</strong> ${member.memberId}</div>
                        <div class="status-info"><strong>Destination:</strong> ${member.destination}</div>
                        <div class="status-info"><strong>Left at:</strong> ${member.timeOut}</div>
                        <div class="status-info"><strong>Expected back:</strong> ${member.estimatedReturn}</div>
                        ${member.isOverdue ? '<div class="status-info" style="color: #e53e3e; font-weight: 600;">⚠️ OVERDUE</div>' : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading status:', error);
                document.getElementById('currentStatus').innerHTML = 
                    '<div class="empty-state">Error loading current status</div>';
            }
        }

        // Handle sign out
        document.getElementById('signOutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const statusDiv = document.getElementById('signOutStatus');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            statusDiv.textContent = 'Signing out...';
            statusDiv.className = 'status-message';
            statusDiv.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const formData = new FormData(e.target);

                const rawDateOut = formData.get('dateOut') || new Date().toISOString().split('T')[0];
                // Convert YYYY-MM-DD → MM-DD-YYYY for backend
                const [oy, om, od] = rawDateOut.split('-');
                const today = `${om}-${od}-${oy}`;
                const data = {
                    memberId: formData.get('memberId'),
                    memberName: formData.get('memberName'),
                    destination: formData.get('destination'),
                    timeOut: formData.get('timeOut'),
                    estimatedReturn: formData.get('estimatedReturn'),
                    date: today
                };

                const response = await fetch(`${API_BASE}/api/signInOut/out`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.textContent = '✓ Successfully signed out!';
                    statusDiv.className = 'status-message success';
                    e.target.reset();
                    setCurrentTime();
                    loadCurrentStatus(); // Refresh the current status
                    
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                } else {
                    throw new Error(result.error || 'Failed to sign out');
                }
            } catch (error) {
                statusDiv.textContent = '✗ Error: ' + error.message;
                statusDiv.className = 'status-message error';
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Handle sign in
        document.getElementById('signInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const statusDiv = document.getElementById('signInStatus');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            statusDiv.textContent = 'Signing in...';
            statusDiv.className = 'status-message';
            statusDiv.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const formData = new FormData(e.target);

                const rawDateIn = formData.get('dateIn') || new Date().toISOString().split('T')[0];
                // Convert YYYY-MM-DD → MM-DD-YYYY for backend
                const [iy, im, id2] = rawDateIn.split('-');
                const today = `${im}-${id2}-${iy}`;
                const data = {
                    memberId: formData.get('memberId'),
                    memberName: formData.get('memberName'),
                    timeIn: formData.get('timeIn'),
                    date: today
                };

                const response = await fetch(`${API_BASE}/api/signInOut/in`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.textContent = '✓ Successfully signed in!';
                    statusDiv.className = 'status-message success';
                    e.target.reset();
                    setCurrentTime();
                    loadCurrentStatus(); // Refresh the current status
                    
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                } else {
                    throw new Error(result.error || 'Failed to sign in');
                }
            } catch (error) {
                statusDiv.textContent = '✗ Error: ' + error.message;
                statusDiv.className = 'status-message error';
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('horizonStaffAuth') === 'true') {
                setCurrentTime();
                loadCurrentStatus();
            }
            // Auto-refresh every 30 seconds
            setInterval(() => {
                if (sessionStorage.getItem('horizonStaffAuth') === 'true') loadCurrentStatus();
            }, 30000);
        });
    </script>
</body>
</html>
