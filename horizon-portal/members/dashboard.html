
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Dashboard – Horizon House</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF8F3; margin: 0; min-height: 100vh; }
    header { background: #F58634; color: #fff; padding: 18px 24px; display: flex; flex-direction: column; gap: 8px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    header h1 { font-size: 20px; margin: 0; }
    #welcomeBanner { font-size: 16px; font-weight: 600; color: #fff; }
    .btn-logout { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-logout:hover { background: rgba(255,255,255,0.35); }
    .header-nav { display: flex; flex-wrap: wrap; gap: 6px; }
    .header-nav a { color: #fff; text-decoration: none; font-size: 14px; padding: 8px 14px; background: rgba(255,255,255,0.2); border-radius: 6px; }
    .header-nav a:hover { background: rgba(255,255,255,0.35); }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px 60px; }
    .dashboard-cards { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; margin-top: 40px; }
    .dashboard-card { background: #fff; border-radius: 14px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); padding: 38px 36px 32px 36px; min-width: 180px; max-width: 220px; flex: 1 1 180px; text-align: center; border: 1px solid #f0e8df; transition: box-shadow 0.2s, border 0.2s; text-decoration: none; color: #2b3440; font-size: 18px; font-weight: 600; }
    .dashboard-card:hover { box-shadow: 0 6px 24px rgba(245,134,52,0.13); border: 1.5px solid #F58634; color: #F58634; }
    .dashboard-card .icon { font-size: 38px; margin-bottom: 18px; display: block; }
    .info-card { background: #fff; border-radius: 14px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); padding: 24px 28px; border: 1px solid #f0e8df; margin-top: 32px; }
    .info-card h3 { margin: 0 0 16px 0; color: #F58634; font-size: 20px; }
    .info-card .empty { color: #999; font-size: 14px; }
    .info-list { list-style: none; padding: 0; margin: 0; }
    .info-list li { padding: 10px 0; border-bottom: 1px solid #f0e8df; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
    .info-list li:last-child { border-bottom: none; }
    .info-list .name { font-weight: 600; color: #2b3440; }
    .info-list .detail { font-size: 14px; color: #777; }
    .milestone-badge { display: inline-block; background: #F58634; color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-left: 8px; }
    .birthday-badge { display: inline-block; background: #E1C462; color: #3a2a00; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-left: 8px; }
    @media (max-width: 700px) { .dashboard-cards { flex-direction: column; gap: 18px; } .dashboard-card { min-width: 0; max-width: 100%; } }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>Member Dashboard</h1>
        <div id="welcomeBanner">Welcome!</div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Log Out</button>
    </div>
    <nav class="header-nav">
      <a href="profile.html">Profile</a>
      <a href="invoices.html">Invoices</a>
      <a href="schedule.html">Schedule</a>
      <a href="announcements.html">Announcements</a>
      <a href="meeting-cards.html">Meeting Cards</a>
    </nav>
  </header>
  <div class="container">
    <div class="dashboard-cards">
      <a class="dashboard-card" href="profile.html">
        <span class="icon">👤</span>
        My Profile
      </a>
      <a class="dashboard-card" href="invoices.html">
        <span class="icon">💳</span>
        View Invoices
      </a>
      <a class="dashboard-card" href="schedule.html">
        <span class="icon">📅</span>
        My Schedule
      </a>
      <a class="dashboard-card" href="announcements.html">
        <span class="icon">📢</span>
        Announcements
      </a>
      <a class="dashboard-card" href="meeting-cards.html">
        <span class="icon">📝</span>
        Meeting Cards
      </a>
    </div>

    <!-- Welcome New Members -->
    <div class="info-card" id="newMembersCard" style="display:none;">
      <h3>🎉 Welcome New Members</h3>
      <ul class="info-list" id="newMembersList"></ul>
    </div>

    <!-- Milestones & Birthdays -->
    <div class="info-card" id="celebrationsCard" style="display:none;">
      <h3>🎂 Milestones &amp; Birthdays</h3>
      <ul class="info-list" id="celebrationsList"></ul>
    </div>
  </div>
  <script>
    const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
    const memberId = localStorage.getItem('memberId') || '';
    const firstName = localStorage.getItem('memberFirstName') || '';
    const lastName = localStorage.getItem('memberLastName') || '';
    if (firstName || lastName) {
      document.getElementById('welcomeBanner').textContent =
        'Welcome, ' + (firstName + ' ' + lastName).trim() + (memberId ? ' (ID: ' + memberId + ')' : '');
    }

    function logout() {
      localStorage.removeItem('memberId');
      localStorage.removeItem('memberFirstName');
      localStorage.removeItem('memberLastName');
      localStorage.removeItem('memberEmail');
      sessionStorage.removeItem('memberId');
      sessionStorage.removeItem('memberName');
      window.location.href = '../member-login-fixed.html';
    }

    function parseDate(raw) {
      if (!raw) return null;
      if (raw instanceof Date) return isNaN(raw) ? null : raw;
      const s = String(raw).trim();
      if (!s) return null;
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }

    function getField(m, ...keys) {
      for (const k of keys) { if (m[k] !== undefined && m[k] !== null && m[k] !== '') return m[k]; }
      return '';
    }

    function fmtDate(d) {
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    (async function loadDashboardCards() {
      try {
        const res = await fetch(API_BASE + '/api/members');
        const all = await res.json();
        const today = new Date(); today.setHours(0,0,0,0);

        // --- New Members (admitted within past 7 days, status 1) ---
        const sevenAgo = new Date(today); sevenAgo.setDate(sevenAgo.getDate() - 7);
        const newMembers = all.filter(m => {
          const st = String(getField(m, 'STATUS', 'status', 'STATU')).toUpperCase().trim();
          if (st !== '1') return false;
          const ad = parseDate(getField(m, 'ADMIT\r\nDATE', 'ADMIT\nDATE', 'ADMIT DATE', 'ADMIT_DATE', 'admitDate'));
          return ad && ad >= sevenAgo && ad <= today;
        });
        if (newMembers.length) {
          const ul = document.getElementById('newMembersList');
          ul.innerHTML = newMembers.map(m => {
            const fn = getField(m, 'FIRST\r\nNAME', 'FIRST\nNAME', 'FIRST NAME', 'FIRST_NAME', 'firstName');
            const ln = getField(m, 'LAST\r\nNAME', 'LAST\nNAME', 'LAST NAME', 'LAST_NAME', 'lastName');
            const nick = getField(m, 'NIC NAME', 'nickname', 'nick');
            const ad = parseDate(getField(m, 'ADMIT\r\nDATE', 'ADMIT\nDATE', 'ADMIT DATE', 'ADMIT_DATE', 'admitDate'));
            const display = nick ? nick : (fn + ' ' + ln).trim();
            return '<li><span class="name">' + display + '</span><span class="detail">Admitted ' + fmtDate(ad) + '</span></li>';
          }).join('');
          document.getElementById('newMembersCard').style.display = '';
        }

        // --- Milestones & Birthdays (within 3 days either way) ---
        const items = [];
        const threeDays = 3 * 86400000;
        const sobrietyMilestones = [30,60,90,180,365,730,1095,1825,3650];
        all.forEach(m => {
          const st = String(getField(m, 'STATUS', 'status', 'STATU')).toUpperCase().trim();
          if (st !== '1' && st !== '2') return;
          const fn = getField(m, 'FIRST\r\nNAME', 'FIRST\nNAME', 'FIRST NAME', 'FIRST_NAME', 'firstName');
          const ln = getField(m, 'LAST\r\nNAME', 'LAST\nNAME', 'LAST NAME', 'LAST_NAME', 'lastName');
          const nick = getField(m, 'NIC NAME', 'nickname', 'nick');
          const display = nick ? nick : (fn + ' ' + ln).trim();

          // Birthday check
          const dob = parseDate(getField(m, 'DOB', 'dob'));
          if (dob) {
            const bday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
            if (Math.abs(bday - today) <= threeDays) {
              const age = today.getFullYear() - dob.getFullYear();
              items.push({ name: display, type: 'birthday', detail: fmtDate(bday), extra: age ? 'Turning ' + age : '' });
            }
          }

          // Sobriety milestone check
          const sd = parseDate(getField(m, 'SOBER\r\nDATE', 'SOBER\nDATE', 'SOBER DATE', 'SOBER_DATE', 'sobrietyDate'));
          if (sd) {
            const daysSober = Math.floor((today - sd) / 86400000);
            for (const ms of sobrietyMilestones) {
              if (Math.abs(daysSober - ms) <= 3) {
                const label = ms >= 365 ? (ms / 365) + ' Year' + (ms > 365 ? 's' : '') : ms + ' Days';
                items.push({ name: display, type: 'milestone', detail: label + ' Sober', extra: '' });
                break;
              }
            }
          }
        });
        if (items.length) {
          const ul = document.getElementById('celebrationsList');
          ul.innerHTML = items.map(it => {
            const badge = it.type === 'birthday'
              ? '<span class="birthday-badge">🎂 Birthday</span>'
              : '<span class="milestone-badge">🌟 Milestone</span>';
            const extra = it.extra ? ' — ' + it.extra : '';
            return '<li><span class="name">' + it.name + badge + '</span><span class="detail">' + it.detail + extra + '</span></li>';
          }).join('');
          document.getElementById('celebrationsCard').style.display = '';
        }
      } catch (e) { console.error('Error loading dashboard cards:', e); }
    })();
  </script>
</body>
</html>
