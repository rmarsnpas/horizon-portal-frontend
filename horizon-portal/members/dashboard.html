<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member List Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 1400px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; }
    h1 { text-align: center; color: #c95f00; margin-bottom: 32px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #e0e0e0; padding: 8px 6px; text-align: left; }
    th { background: #F58634; color: #fff; font-weight: 700; }
    tr:nth-child(even) { background: #faf6f2; }
    tr:hover { background: #fff3e8; }
    th.narrow, td.narrow { width: 44px; text-align: center; }
    th.nickname, td.nickname { background: #ffe0b2; }
    .sticky-header th { position: sticky; top: 0; z-index: 2; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Member List</h1>
    <div style="overflow-x:auto;">
      <table>
        <thead class="sticky-header">
          <tr>
            <th class="narrow">#</th>
            <th class="narrow">YR</th>
            <th class="narrow">ID</th>
            <th class="narrow">STATUS</th>
            <th class="narrow">M/F</th>
            <th>FIRST</th>
            <th>LAST</th>
            <th>ADMIT DATE</th>
            <th>DISCHARGE DATE</th>
            <th>DAYS HERE</th>
            <th>BED</th>
            <th>KEY</th>
            <th>REF</th>
            <th>RATE</th>
            <th class="nickname">NICKNAME</th>
            <th>DOB</th>
            <th>SOBER DATE</th>
            <th>DAYSOBER</th>
            <th>PHONE</th>
            <th>EMAIL</th>
            <th>PIN</th>
            <th>BILL ON DAY</th>
          </tr>
        </thead>
        <tbody id="memberTableBody">
          <!-- Data rows will be inserted here by JS -->
        </tbody>
      </table>
    </div>
  </div>
  <script>
    // Placeholder for dynamic data loading
    // Example: fetch('/api/members').then(...)
  </script>
</body>
</html>
