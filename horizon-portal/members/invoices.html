<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices – Horizon House</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #FFF8F3;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #F58634;
      color: #fff;
      padding: 20px;
      position: relative;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #FFF8F3;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(245,134,52,0.08);
    }

    h1 {
      text-align: center;
      margin: 0;
    }

    h2 {
      color: #F58634;
      margin-top: 0;
    }

    .header-buttons {
      position: absolute;
      right: 20px;
      top: 20px;
      display: flex;
      gap: 10px;
    }

    .header-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-dashboard {
      background-color: white;
      color: #F58634;
    }

    .btn-dashboard:hover {
      background-color: #f0f0f0;
    }

    .btn-logout {
      background-color: #E1C462;
      color: #fff;
    }

    .btn-logout:hover {
      background-color: #F58634;
    }

    .section {
      margin-top: 22px;
    }

    .card {
      background: #FFF8F3;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 18px;
      border: 1px solid #F58634;
    }

    .muted {
      color: #555;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #FFF8F3;
      border: 1px solid #F58634;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #E1C462;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #E1C462;
      color: #FFF8F3;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      background-color: #F58634;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .btn:hover {
      background-color: #E1C462;
    }

    .btn-secondary {
      background: #E1C462;
    }

    .btn-secondary:hover {
      background: #F58634;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill-unpaid {
      background: #FFF8F3;
      color: #F58634;
      border: 1px solid #F58634;
    }

    .pill-paid {
      background: #F4F9F6;
      color: #94A880;
      border: 1px solid #94A880;
    }

    .error {
      background: #FFF8F3;
      color: #F58634;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #F58634;
      margin-top: 12px;
      display: none;
    }

    @media (max-width: 700px) {
      .header-buttons {
        position: static;
        justify-content: center;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Invoices</h1>
    <div class="header-buttons">
      <a href="dashboard.html" class="header-btn btn-dashboard">← Dashboard</a>
      <button onclick="logout()" class="header-btn btn-logout">🚪 Log Out</button>
    </div>
  </header>

  <div class="container">
    <h2>Your Invoices</h2>
    <p class="muted">Unpaid invoices appear first. If you don’t see an invoice you expect, it may not have been uploaded yet.</p>

    <div id="error" class="error" role="alert" aria-live="assertive"></div>

    <div class="section card">
      <h3 style="margin:0;color:#F58634;">Unpaid</h3>
      <div id="unpaidEmpty" class="muted" style="margin-top:8px; display:none;">No unpaid invoices found.</div>
      <div id="unpaidWrap"></div>
    </div>

    <div class="section card">
      <h3 style="margin:0;color:#F58634;">Paid</h3>
      <div id="paidEmpty" class="muted" style="margin-top:8px; display:none;">No paid invoices found.</div>
      <div id="paidWrap"></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const memberId = (urlParams.get('id') || localStorage.getItem('memberId') || '').trim();

    if (!memberId) {
      window.location.href = '/members/login.html';
    }

    const memberEmail = (localStorage.getItem('memberEmail') || '').trim();

    function showError(message) {
      const el = document.getElementById('error');
      el.textContent = message;
      el.style.display = 'block';
    }

    function hideError() {
      const el = document.getElementById('error');
      el.textContent = '';
      el.style.display = 'none';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = String(str ?? '');
      return div.innerHTML;
    }

    function formatMoney(amount) {
      if (amount === null || amount === undefined || amount === '') return '';
      const n = Number(amount);
      if (!Number.isFinite(n)) return String(amount);
      return `$${n.toFixed(2)}`;
    }

    function normalizeDateDisplay(dateStr) {
      if (!dateStr) return '';
      const s = String(dateStr).trim();
      // Preferred: MM-DD-YYYY
      if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
      // Legacy: YYYY-MM-DD
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [yyyy, mm, dd] = s.split('-');
        return `${mm}-${dd}-${yyyy}`;
      }
      return s;
    }

    function buildAbsoluteUrl(relativeUrl) {
      try {
        return new URL(relativeUrl, window.location.href).href;
      } catch {
        return relativeUrl;
      }
    }

    function printPdf(pdfUrl) {
      const win = window.open(pdfUrl, '_blank');
      if (!win) {
        showError('Pop-up blocked. Please allow pop-ups to print.');
        return;
      }
      win.addEventListener('load', () => {
        try { win.print(); } catch (e) { /* ignore */ }
      });
    }

    function emailInvoice(invoiceNumber, pdfUrl) {
      const subject = `Invoice ${invoiceNumber || ''}`.trim();
      const link = buildAbsoluteUrl(pdfUrl);
      const body = `Invoice link: ${link}`;

      const to = memberEmail || '';
      const href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = href;
    }

    function renderTable(targetId, invoices, status) {
      const wrap = document.getElementById(targetId);
      if (!invoices.length) {
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th style="width: 18%">Status</th>
            <th style="width: 28%">Invoice</th>
            <th style="width: 18%">Due/Paid</th>
            <th style="width: 16%">Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = table.querySelector('tbody');

      invoices.forEach((inv) => {
        const tr = document.createElement('tr');

        const pillClass = status === 'unpaid' ? 'pill pill-unpaid' : 'pill pill-paid';
        const label = status === 'unpaid' ? 'UNPAID' : 'PAID';

        const rawDate = status === 'unpaid' ? (inv.dueDate || '') : (inv.paidDate || '');
        const date = normalizeDateDisplay(rawDate);
        const pdfUrl = `../${inv.pdfPath}`;

        const invoiceNumber = inv.invoiceNumber || '';
        const amount = formatMoney(inv.amount);

        const parseWarning = inv.parseOk ? '' : '<div class="muted" style="margin-top:4px;">Filename missing MID/INV token</div>';

        tr.innerHTML = `
          <td><span class="${pillClass}">${label}</span></td>
          <td>
            <div style="font-weight:700;">${escapeHtml(invoiceNumber || inv.fileName || '')}</div>
            <div class="muted" style="margin-top:2px;">${escapeHtml(inv.fileName || '')}</div>
            ${parseWarning}
          </td>
          <td>${escapeHtml(date)}</td>
          <td>${escapeHtml(amount)}</td>
          <td>
            <div class="actions">
              <a class="btn" href="${pdfUrl}" target="_blank" rel="noopener">View</a>
              <button class="btn btn-secondary" type="button" data-action="print">Print</button>
              <button class="btn" type="button" data-action="email">Email</button>
            </div>
          </td>
        `;

        tr.querySelector('[data-action="print"]').addEventListener('click', () => printPdf(pdfUrl));
        tr.querySelector('[data-action="email"]').addEventListener('click', () => emailInvoice(invoiceNumber, pdfUrl));

        tbody.appendChild(tr);
      });

      wrap.appendChild(table);
    }

    // Debug: Show current memberId and all loaded invoices
    function debugInfo(memberId, allInvoices) {
      let debugDiv = document.getElementById('debugInfoBanner');
      if (!debugDiv) {
        debugDiv = document.createElement('div');
        debugDiv.id = 'debugInfoBanner';
        debugDiv.style.position = 'sticky';
        debugDiv.style.top = '0';
        debugDiv.style.zIndex = '1000';
        debugDiv.style.background = '#ffb347';
        debugDiv.style.color = '#222';
        debugDiv.style.padding = '18px 16px';
        debugDiv.style.margin = '0 0 18px 0';
        debugDiv.style.borderBottom = '3px solid #F58634';
        debugDiv.style.fontSize = '15px';
        debugDiv.style.fontWeight = 'bold';
        debugDiv.style.boxShadow = '0 2px 8px rgba(245,134,52,0.12)';
        document.body.prepend(debugDiv);
      }
      debugDiv.innerHTML = `<b>DEBUG INFO</b> &nbsp; | &nbsp; <b>memberId:</b> <code style='font-size:16px;color:#b30000;background:#fff3e0;padding:2px 6px;border-radius:4px;'>${escapeHtml(memberId)}</code><br><b>Loaded invoices:</b> <pre style='max-height:300px;overflow:auto;background:#fff3e0;border:1px solid #F58634;padding:8px 10px;border-radius:6px;margin-top:6px;'>${escapeHtml(JSON.stringify(allInvoices, null, 2))}</pre>`;
    }

    async function loadInvoices() {
      hideError();

      // Check if this member should see invoices (REF=H means county-managed, no portal invoices)
      try {
        const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
        const mr = await fetch(`${API_BASE}/api/getMember?id=${encodeURIComponent(memberId)}`);
        const md = await mr.json();
        if (md && md.HIDE_INVOICES) {
          document.querySelectorAll('.section.card').forEach(el => el.style.display = 'none');
          showError('Invoices are managed through your program coordinator. Please contact staff for billing questions.');
          return;
        }
      } catch(e) { /* continue if check fails */ }

      // Relative URL so it works when the portal is hosted at root or under /horizon-portal/
      const manifestUrl = `../invoices/invoices.json?t=${Date.now()}`;

      let payload;
      try {
        const res = await fetch(manifestUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Manifest not found (${res.status})`);
        payload = await res.json();
      } catch (e) {
        console.error(e);
        showError('Unable to load invoices. Please try again later.');
        document.getElementById('unpaidEmpty').style.display = 'block';
        document.getElementById('paidEmpty').style.display = 'block';
        return;
      }

      const all = Array.isArray(payload?.invoices) ? payload.invoices : [];

      const mine = all.filter((inv) => String(inv.memberId || '').trim() === String(memberId).trim());
      const unpaid = mine.filter((inv) => inv.status === 'unpaid');
      const paid = mine.filter((inv) => inv.status === 'paid');

      if (!unpaid.length) document.getElementById('unpaidEmpty').style.display = 'block';
      if (!paid.length) document.getElementById('paidEmpty').style.display = 'block';

      renderTable('unpaidWrap', unpaid, 'unpaid');
      renderTable('paidWrap', paid, 'paid');
    }

    // Logout function
    function logout() {
      localStorage.removeItem('memberId');
      localStorage.removeItem('memberFirstName');
      localStorage.removeItem('memberLastName');
      localStorage.removeItem('memberEmail');
      sessionStorage.removeItem('memberId');
      sessionStorage.removeItem('memberName');
      window.location.href = '/members/login.html';
    }

    loadInvoices();
  </script>
</body>
</html>
