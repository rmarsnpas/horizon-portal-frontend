<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Schedules – Staff View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 22px 28px;
            border-radius: 12px;
            margin-bottom: 22px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .header h1 { color: #2d3748; font-size: 24px; margin-bottom: 6px; }
        .header p { color: #718096; font-size: 14px; }
        .nav-links { margin-top: 10px; }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin-right: 18px;
            font-weight: 500;
            font-size: 14px;
        }
        .nav-links a:hover { text-decoration: underline; }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }
        .refresh-btn:hover { background: #5a67d8; }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }
        .stat-box {
            background: white;
            padding: 18px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }
        .stat-number { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-label { color: #718096; margin-top: 4px; font-size: 13px; }
        .filters-bar {
            background: white;
            padding: 18px 22px;
            border-radius: 12px;
            margin-bottom: 22px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
        .filter-group label { font-size: 12px; font-weight: 600; color: #4a5568; }
        .filter-group select, .filter-group input {
            padding: 8px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            color: #2d3748;
        }
        .filter-group select:focus, .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-clear {
            padding: 8px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            color: #4a5568;
            align-self: flex-end;
        }
        .btn-clear:hover { background: #f7fafc; }
        .view-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .view-tab {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.25);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .view-tab.active { background: white; color: #667eea; }
        /* BY MEMBER VIEW */
        .member-section {
            background: white;
            border-radius: 12px;
            margin-bottom: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .member-section-header {
            background: #f7fafc;
            padding: 16px 22px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .member-section-header h3 { color: #2d3748; font-size: 17px; }
        .member-section-header .count-badge {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .entries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 14px;
            padding: 18px 22px;
        }
        /* BY DAY VIEW */
        .day-section {
            background: white;
            border-radius: 12px;
            margin-bottom: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .day-section-header {
            padding: 14px 22px;
            color: white;
            font-weight: 700;
            font-size: 17px;
        }
        .day-Monday { background: #4299e1; }
        .day-Tuesday { background: #48bb78; }
        .day-Wednesday { background: #ed8936; }
        .day-Thursday { background: #9f7aea; }
        .day-Friday { background: #e53e3e; }
        .day-Saturday { background: #dd6b20; }
        .day-Sunday { background: #718096; }
        /* Entry card */
        .entry-card {
            background: #fafafa;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
        }
        .entry-card .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .badge-IOP { background: #bee3f8; color: #2b6cb0; }
        .badge-Work { background: #c6f6d5; color: #276749; }
        .badge-Volunteering { background: #fefcbf; color: #744210; }
        .badge-Medical { background: #fed7e2; color: #97266d; }
        .badge-Court { background: #e9d8fd; color: #553c9a; }
        .badge-Meeting { background: #e6fffa; color: #234e52; }
        .badge-School { background: #ebf8ff; color: #2c5282; }
        .badge-Other { background: #edf2f7; color: #4a5568; }
        .entry-card .entry-member { font-size: 15px; font-weight: 700; color: #2d3748; margin-bottom: 6px; }
        .entry-card .entry-detail { font-size: 13px; color: #4a5568; line-height: 1.7; }
        .entry-card .entry-detail strong { color: #2d3748; }
        .entry-card .entry-meta { font-size: 11px; color: #a0aec0; margin-top: 6px; }
        .btn-delete-staff {
            background: none;
            border: 1px solid #fca5a5;
            color: #dc2626;
            border-radius: 5px;
            padding: 3px 10px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-delete-staff:hover { background: #fee2e2; }
        .loading-text { text-align: center; padding: 40px; color: white; font-size: 16px; }
        .empty-state { text-align: center; padding: 40px; color: #a0aec0; font-style: italic; }
        .no-results { background: white; border-radius: 12px; padding: 40px; text-align: center; color: #718096; }
        @media (max-width: 700px) {
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .entries-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>📅 Member Schedules</h1>
            <p>All submitted member schedules — IOP, work, volunteering, and more</p>
            <div class="nav-links">
                <a href="../../staff-dashboard.html">← Staff Dashboard</a>
                <a href="member-status.html">🚪 Sign In/Out</a>
            </div>
        </div>
        <button class="refresh-btn" onclick="loadSchedules()">🔄 Refresh</button>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-number" id="statTotal">-</div>
            <div class="stat-label">Total Entries</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statMembers">-</div>
            <div class="stat-label">Members with Schedules</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statIOP">-</div>
            <div class="stat-label">IOP Entries</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statWork">-</div>
            <div class="stat-label">Work Entries</div>
        </div>
    </div>

    <div class="filters-bar">
        <div class="filter-group">
            <label>Filter by Type</label>
            <select id="filterType" onchange="applyFilters()">
                <option value="">All Types</option>
                <option value="IOP">IOP</option>
                <option value="Work">Work</option>
                <option value="Volunteering">Volunteering</option>
                <option value="Medical">Medical / Dental</option>
                <option value="Court">Court / Legal</option>
                <option value="Meeting">AA / NA Meeting</option>
                <option value="School">School / GED</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Filter by Day</label>
            <select id="filterDay" onchange="applyFilters()">
                <option value="">All Days</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
                <option value="onetime">One-Time Events</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Search Member</label>
            <input type="text" id="filterMember" placeholder="Name or ID..." oninput="applyFilters()">
        </div>
        <button class="btn-clear" onclick="clearFilters()">✕ Clear</button>
    </div>

    <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('member', this)">👤 By Member</button>
        <button class="view-tab" onclick="switchView('day', this)">📆 By Day</button>
        <button class="view-tab" onclick="switchView('list', this)">📋 All Entries</button>
    </div>

    <div id="loadingText" class="loading-text">Loading schedules...</div>
    <div id="mainContent" style="display:none;"></div>
</div>

<script>
    const API_BASE = 'https://horizon-portal-backend-production-3532.up.railway.app';
    let allSchedules = [];
    let filteredSchedules = [];
    let currentView = 'member';

    const DAYS_ORDER = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

    async function loadSchedules() {
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/schedules`);
            const data = await res.json();
            allSchedules = data.schedules || [];
            filteredSchedules = [...allSchedules];
            updateStats();
            renderView();
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } catch (err) {
            document.getElementById('loadingText').textContent = 'Error loading schedules. Is the backend running?';
        }
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = allSchedules.length;
        const unique = new Set(allSchedules.map(s => s.memberId)).size;
        document.getElementById('statMembers').textContent = unique;
        document.getElementById('statIOP').textContent = allSchedules.filter(s => s.type === 'IOP').length;
        document.getElementById('statWork').textContent = allSchedules.filter(s => s.type === 'Work').length;
    }

    function applyFilters() {
        const typeFilter = document.getElementById('filterType').value;
        const dayFilter = document.getElementById('filterDay').value;
        const memberFilter = document.getElementById('filterMember').value.toLowerCase().trim();

        filteredSchedules = allSchedules.filter(s => {
            if (typeFilter && s.type !== typeFilter) return false;
            if (dayFilter) {
                if (dayFilter === 'onetime') {
                    if (s.scheduleType !== 'onetime') return false;
                } else {
                    if (s.scheduleType === 'onetime') return false;
                    if (!s.days || !s.days.includes(dayFilter)) return false;
                }
            }
            if (memberFilter) {
                const nameMatch = (s.memberName || '').toLowerCase().includes(memberFilter);
                const idMatch = String(s.memberId || '').includes(memberFilter);
                if (!nameMatch && !idMatch) return false;
            }
            return true;
        });

        renderView();
    }

    function clearFilters() {
        document.getElementById('filterType').value = '';
        document.getElementById('filterDay').value = '';
        document.getElementById('filterMember').value = '';
        filteredSchedules = [...allSchedules];
        renderView();
    }

    function switchView(view, el) {
        currentView = view;
        document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderView();
    }

    function renderView() {
        const container = document.getElementById('mainContent');
        if (filteredSchedules.length === 0) {
            container.innerHTML = '<div class="no-results">No schedule entries found.</div>';
            return;
        }
        if (currentView === 'member') renderByMember(container);
        else if (currentView === 'day') renderByDay(container);
        else renderAllList(container);
    }

    function renderByMember(container) {
        // Group by member
        const groups = {};
        filteredSchedules.forEach(s => {
            const key = s.memberId;
            if (!groups[key]) groups[key] = { name: s.memberName, id: s.memberId, entries: [] };
            groups[key].entries.push(s);
        });

        // Sort by name
        const sorted = Object.values(groups).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

        container.innerHTML = sorted.map(g => `
            <div class="member-section">
                <div class="member-section-header">
                    <h3>👤 ${g.name || 'Member'} <span style="color:#a0aec0; font-size:13px; font-weight:400;">ID: ${g.id}</span></h3>
                    <span class="count-badge">${g.entries.length} entr${g.entries.length === 1 ? 'y' : 'ies'}</span>
                </div>
                <div class="entries-grid">
                    ${g.entries.map(s => entryCard(s)).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderByDay(container) {
        // Collect: each weekly entry expands into its days; one-time entries go under their date
        const dayBuckets = {};
        DAYS_ORDER.forEach(d => dayBuckets[d] = []);
        dayBuckets['One-Time / Dates'] = [];

        filteredSchedules.forEach(s => {
            if (s.scheduleType === 'onetime') {
                dayBuckets['One-Time / Dates'].push(s);
            } else if (s.days) {
                s.days.forEach(d => {
                    if (dayBuckets[d]) dayBuckets[d].push(s);
                });
            }
        });

        const html = [];
        DAYS_ORDER.forEach(d => {
            if (dayBuckets[d].length === 0) return;
            // Sort by start time
            const sorted = [...dayBuckets[d]].sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
            html.push(`
                <div class="day-section">
                    <div class="day-section-header day-${d}">${d} — ${sorted.length} member${sorted.length !== 1 ? 's' : ''} out</div>
                    <div class="entries-grid" style="padding: 18px;">
                        ${sorted.map(s => entryCardWithMember(s)).join('')}
                    </div>
                </div>
            `);
        });

        if (dayBuckets['One-Time / Dates'].length > 0) {
            const sorted = [...dayBuckets['One-Time / Dates']].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
            html.push(`
                <div class="day-section">
                    <div class="day-section-header day-Sunday">📆 One-Time Events</div>
                    <div class="entries-grid" style="padding: 18px;">
                        ${sorted.map(s => entryCardWithMember(s)).join('')}
                    </div>
                </div>
            `);
        }

        container.innerHTML = html.join('') || '<div class="no-results">No entries for selected filters.</div>';
    }

    function renderAllList(container) {
        const sorted = [...filteredSchedules].sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
        container.innerHTML = `
            <div style="background: white; border-radius: 12px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.08);">
                <div class="entries-grid" style="padding: 0;">
                    ${sorted.map(s => entryCardWithMember(s)).join('')}
                </div>
            </div>
        `;
    }

    function entryCard(s) {
        const badgeClass = 'badge-' + (s.type || 'Other').replace(/[^a-zA-Z]/g, '');
        let recStr = '';
        if (s.scheduleType === 'weekly' && s.days) {
            recStr = `<div><strong>Days:</strong> ${s.days.join(', ')}</div>`;
            if (s.effectiveStart) recStr += `<div><strong>From:</strong> ${fmtDate(s.effectiveStart)}</div>`;
            if (s.effectiveEnd) recStr += `<div><strong>Until:</strong> ${fmtDate(s.effectiveEnd)}</div>`;
        } else if (s.scheduleType === 'onetime' && s.date) {
            recStr = `<div><strong>Date:</strong> ${fmtDate(s.date)}</div>`;
        }
        return `
            <div class="entry-card">
                <span class="type-badge ${badgeClass}">${s.type}</span>
                <div class="entry-detail">
                    <div><strong>Time:</strong> ${fmtTime(s.startTime)} – ${fmtTime(s.endTime)}</div>
                    ${recStr}
                    ${s.location ? `<div><strong>Location:</strong> ${s.location}</div>` : ''}
                    ${s.notes ? `<div><strong>Notes:</strong> ${s.notes}</div>` : ''}
                </div>
                <div class="entry-meta">Submitted ${fmtDateTime(s.submittedAt)}</div>
                <button class="btn-delete-staff" onclick="deleteEntry('${s.id}')">🗑 Remove</button>
            </div>
        `;
    }

    function entryCardWithMember(s) {
        const badgeClass = 'badge-' + (s.type || 'Other').replace(/[^a-zA-Z]/g, '');
        let recStr = '';
        if (s.scheduleType === 'weekly' && s.days) {
            recStr = `<div><strong>Days:</strong> ${s.days.join(', ')}</div>`;
            if (s.effectiveStart) recStr += `<div><strong>From:</strong> ${fmtDate(s.effectiveStart)}</div>`;
            if (s.effectiveEnd) recStr += `<div><strong>Until:</strong> ${fmtDate(s.effectiveEnd)}</div>`;
        } else if (s.scheduleType === 'onetime' && s.date) {
            recStr = `<div><strong>Date:</strong> ${fmtDate(s.date)}</div>`;
        }
        return `
            <div class="entry-card">
                <span class="type-badge ${badgeClass}">${s.type}</span>
                <div class="entry-member">${s.memberName || 'Unknown'} <span style="font-weight:400; font-size:12px; color:#718096;">ID: ${s.memberId}</span></div>
                <div class="entry-detail">
                    <div><strong>Time:</strong> ${fmtTime(s.startTime)} – ${fmtTime(s.endTime)}</div>
                    ${recStr}
                    ${s.location ? `<div><strong>Location:</strong> ${s.location}</div>` : ''}
                    ${s.notes ? `<div><strong>Notes:</strong> ${s.notes}</div>` : ''}
                </div>
                <div class="entry-meta">Submitted ${fmtDateTime(s.submittedAt)}</div>
                <button class="btn-delete-staff" onclick="deleteEntry('${s.id}')">🗑 Remove</button>
            </div>
        `;
    }

    async function deleteEntry(id) {
        if (!confirm('Remove this schedule entry?')) return;
        try {
            const res = await fetch(`${API_BASE}/api/schedules/${encodeURIComponent(id)}`, { method: 'DELETE' });
            const result = await res.json();
            if (result.success) {
                allSchedules = allSchedules.filter(s => s.id !== id);
                filteredSchedules = filteredSchedules.filter(s => s.id !== id);
                updateStats();
                renderView();
            } else {
                alert('Error: ' + (result.error || 'Failed to delete'));
            }
        } catch (err) {
            alert('Connection error.');
        }
    }

    function fmtTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        const hr = h % 12 || 12;
        return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function fmtDate(d) {
        if (!d) return '';
        const [y, mo, da] = d.split('-');
        return `${mo}/${da}/${y}`;
    }

    function fmtDateTime(iso) {
        if (!iso) return '';
        const dt = new Date(iso);
        if (isNaN(dt)) return iso;
        return dt.toLocaleDateString('en-US') + ' ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    loadSchedules();
    setInterval(loadSchedules, 60000); // Auto-refresh every minute
</script>
</body>
</html>
