name: Auto Deploy Invoices

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for invoice update'
        required: false
        default: 'Auto-update invoices and PDFs'

jobs:
  deploy-invoices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add invoices and PDFs
        run: |
          git add horizon-portal/invoices/invoices.json horizon-portal/invoices/unpaid/* horizon-portal/invoices/paid/*

      - name: Commit changes
        run: |
          git commit -m "${{ github.event.inputs.commit_message }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
