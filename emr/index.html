<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member File Cabinet – Horizon House</title>
<style>
:root {
  --primary: #F58634;
  --gold: #E1C462;
  --green: #2d6a4f;
  --green-light: #40916c;
  --bg: #f4f6f9;
  --white: #fff;
  --border: #e2e8f0;
  --text: #2d3748;
  --muted: #718096;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Login ── */
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--green) 0%, #1b4332 100%); }
.login-box { background: var(--white); border-radius: 14px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.login-box h1 { color: var(--green); font-size: 1.5rem; margin-bottom: 6px; }
.login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; color: var(--text); }
.form-row input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 7px; font-size: 15px; }
.form-row input:focus { outline: none; border-color: var(--green); }
.btn-primary { width: 100%; padding: 13px; background: var(--green); color: #fff; border: none; border-radius: 7px; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-primary:hover { background: var(--green-light); }
#loginError { color: #e53e3e; font-size: 13px; margin-top: 10px; display: none; }

/* ── App Shell ── */
#appShell { display: none; min-height: 100vh; }
.top-bar { background: var(--green); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.top-bar h1 { font-size: 1.15rem; font-weight: 700; }
.top-bar .top-right { display: flex; gap: 10px; align-items: center; }
.btn-sm { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
.btn-logout { background: rgba(255,255,255,0.2); color: #fff; }
.btn-logout:hover { background: rgba(255,255,255,0.35); }

/* ── Layout ── */
.layout { display: flex; height: calc(100vh - 54px); }

/* ── Member List Sidebar ── */
.sidebar { width: 280px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-search { padding: 14px; border-bottom: 1px solid var(--border); }
.sidebar-search input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; }
.sidebar-search input:focus { outline: none; border-color: var(--green); }
.member-list { flex: 1; overflow-y: auto; }
.member-item { padding: 12px 16px; border-bottom: 1px solid #f0f4f8; cursor: pointer; transition: background .15s; }
.member-item:hover { background: #f0fff4; }
.member-item.active { background: #d4edda; border-left: 3px solid var(--green); }
.member-item .m-name { font-weight: 700; font-size: 14px; color: var(--text); }
.member-item .m-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.member-count { padding: 8px 16px; font-size: 12px; color: var(--muted); background: #f8fafb; border-bottom: 1px solid var(--border); }

/* ── File View ── */
.file-view { flex: 1; overflow-y: auto; padding: 24px; }
.file-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); }
.file-placeholder .icon { font-size: 64px; margin-bottom: 16px; }

.member-header { background: var(--white); border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
.member-header .avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
.member-header .info h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 4px; }
.member-header .info .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.badge-green { background: #d4edda; color: #155724; }
.badge-blue  { background: #cce5ff; color: #004085; }
.badge-gray  { background: #e2e8f0; color: #4a5568; }
.badge-orange{ background: #ffe5cc; color: #7a3800; }

/* ── Upload Bar ── */
.upload-bar { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.upload-bar select, .upload-bar input[type=text] { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
.upload-bar select { min-width: 200px; }
.upload-bar input[type=text] { flex: 1; min-width: 180px; }
.btn-upload-file { padding: 9px 18px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-upload-file:disabled { background: #a0aec0; cursor: not-allowed; }
.btn-camera { padding: 9px 14px; background: var(--gold); color: #3a2a00; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; }
#uploadStatusBar { width: 100%; font-size: 13px; font-weight: 700; display: none; padding: 6px 12px; border-radius: 6px; }

/* ── Section Cards ── */
.section-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.section-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.section-header:hover { background: #f8fafb; }
.section-title { font-weight: 700; font-size: 15px; color: var(--text); display: flex; align-items: center; gap: 10px; }
.section-count { background: var(--green); color: #fff; padding: 2px 9px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.section-count.zero { background: #e2e8f0; color: #718096; }
.section-chevron { color: var(--muted); font-size: 14px; transition: transform .2s; }
.section-chevron.open { transform: rotate(90deg); }
.section-body { display: none; border-top: 1px solid var(--border); }
.section-body.open { display: block; }

/* ── Table ── */
.file-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.file-table th { background: #f8fafb; padding: 9px 14px; text-align: left; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
.file-table td { padding: 10px 14px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
.file-table tr:last-child td { border-bottom: none; }
.file-table tr:hover td { background: #f8fafb; }
.empty-row td { color: var(--muted); font-style: italic; text-align: center; padding: 20px; }

.btn-view { padding: 5px 12px; background: var(--green); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 700; }
.btn-del  { padding: 5px 10px; background: #fee2e2; color: #991b1b; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 700; }

/* ── Status Tabs ── */
.status-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: #f8fafb; flex-shrink: 0; }
.status-tab { flex: 1; padding: 9px 4px; border: none; background: none; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
.status-tab:hover { background: #f0fff4; color: var(--green); }
.status-tab.active { color: var(--green); border-bottom-color: var(--green); background: #fff; }
.status-tab .tab-count { display: inline-block; background: #e2e8f0; color: #4a5568; padding: 1px 6px; border-radius: 8px; font-size: 11px; margin-left: 3px; }
.status-tab.active .tab-count { background: var(--green); color: #fff; }

/* ── Profile Card ── */
#profileOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:20000; align-items:center; justify-content:center; }
.profile-card { background:#fff; border-radius:14px; padding:28px 24px; max-width:480px; width:95%; box-shadow:0 8px 40px rgba(0,0,0,0.22); position:relative; max-height:90vh; overflow-y:auto; }
.profile-card .pc-avatar { width:64px; height:64px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700; flex-shrink:0; }
.profile-card .pc-header { display:flex; gap:16px; align-items:center; margin-bottom:20px; }
.profile-card .pc-name { font-size:1.3rem; font-weight:800; color:var(--text); }
.profile-card .pc-id { font-size:13px; color:var(--muted); margin-top:2px; }
.profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.profile-field label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.profile-field span { font-size:14px; color:var(--text); font-weight:600; }
.btn-pc-close { position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.6rem; cursor:pointer; color:var(--muted); line-height:1; }
.preview-box { background: var(--white); border-radius: 12px; padding: 20px; max-width: 92vw; max-height: 92vh; overflow: auto; position: relative; min-width: 320px; }
.preview-box img { max-width: 100%; max-height: 75vh; border-radius: 6px; display: block; margin: 0 auto; }
.preview-box iframe { width: 80vw; height: 75vh; border: none; border-radius: 6px; }
.preview-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.btn-print { padding: 8px 16px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
.btn-close { padding: 8px 16px; background: #718096; color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
.btn-save-rec { padding: 8px 16px; background: #155724; color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }

@media (max-width: 700px) {
  .layout { flex-direction: column; height: auto; }
  .sidebar { width: 100%; height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
  .file-view { padding: 14px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>📂 Member File Cabinet</h1>
    <p>Horizon House – Staff Access Only</p>
    <div class="form-row">
      <label>Member ID</label>
      <input type="text" id="loginId" placeholder="Your Member ID" autocomplete="username">
    </div>
    <div class="form-row">
      <label>Staff Password</label>
      <input type="password" id="loginPw" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div id="loginError">Incorrect credentials or insufficient access.</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="top-bar">
    <h1>📂 Member File Cabinet</h1>
    <div class="top-right">
      <span id="loggedInAs" style="font-size:13px;opacity:.85;"></span>
      <a href="/staff-dashboard.html" class="btn-sm btn-logout">← Dashboard</a>
      <button class="btn-sm btn-logout" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="memberSearch" placeholder="🔍 Search by name or ID…" oninput="filterMembers()">
      </div>
      <div class="status-tabs" id="statusTabs">
        <button class="status-tab active" data-tab="active" onclick="setTab('active',this)">Current<span class="tab-count" id="tc-active">0</span></button>
        <button class="status-tab" data-tab="alumni" onclick="setTab('alumni',this)">Alumni<span class="tab-count" id="tc-alumni">0</span></button>
        <button class="status-tab" data-tab="discharged" onclick="setTab('discharged',this)">D/C<span class="tab-count" id="tc-discharged">0</span></button>
        <button class="status-tab" data-tab="all" onclick="setTab('all',this)">All<span class="tab-count" id="tc-all">0</span></button>
      </div>
      <div class="member-count" id="memberCount">Loading…</div>
      <div class="member-list" id="memberList"></div>
    </div>

    <!-- File View -->
    <div class="file-view" id="fileView">
      <div class="file-placeholder" id="filePlaceholder">
        <div class="icon">📁</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Select a member</div>
        <div style="font-size:14px;">Choose a member from the list to open their file.</div>
      </div>
      <div id="memberFile" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- Document Preview Overlay -->
<div id="previewOverlay" style="display:none;">
  <div class="preview-box">
    <div class="preview-actions">
      <button class="btn-print" onclick="printPreview()">🖨️ Print</button>
      <button id="btnSaveRec" class="btn-save-rec" onclick="savePreviewToRecord()">✔ Save to Record</button>
      <button class="btn-close" onclick="closePreview()">✕ Close</button>
    </div>
    <div id="previewTitle" style="font-weight:700;margin-bottom:12px;color:#2d3748;"></div>
    <div id="previewContent"></div>
  </div>
</div>

<!-- Profile Card Overlay -->
<div id="profileOverlay" style="display:none;">
  <div class="profile-card">
    <button class="btn-pc-close" onclick="closeProfileCard()">&times;</button>
    <div class="pc-header">
      <div class="pc-avatar" id="pcAvatar"></div>
      <div>
        <div class="pc-name" id="pcName"></div>
        <div class="pc-id" id="pcId"></div>
      </div>
    </div>
    <div class="profile-grid" id="pcGrid"></div>
  </div>
</div>

<input type="file" id="hiddenFileInput" accept="image/*,.pdf" style="display:none" onchange="fileChosen(this)">
<input type="file" id="hiddenCameraInput" accept="image/*" capture="environment" style="display:none" onchange="fileChosen(this)">

<script>
const API = 'https://horizon-portal-backend-production-3532.up.railway.app/api';
const SESSION_KEY = 'emr_session';
let _allMembers = [];
let _currentMemberId = null;
let _pendingUploadFile = null;
let _previewDoc = null;
let _activeTab = 'active';
let _currentMemberData = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!id || !pw) { errEl.textContent = 'Please enter your ID and password.'; errEl.style.display = 'block'; return; }
  try {
    const res = await fetch(`${API}/verifyStaff`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, pw }) });
    const json = await res.json();
    if (!json.ok && json.reason !== 'no_staff_pw') { errEl.textContent = 'Incorrect credentials or insufficient access.'; errEl.style.display = 'block'; return; }
    // Check access level
    const mRes = await fetch(`${API}/getMember?id=${encodeURIComponent(id)}`);
    const member = await mRes.json();
    const access = Number(member?.STATU ?? member?.status ?? 0);
    if (access < 4) { errEl.textContent = 'Staff or admin access required.'; errEl.style.display = 'block'; return; }
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ id, name: (member.FIRST_NAME || member.firstName || '') + ' ' + (member.LAST_NAME || member.lastName || '') }));
    showApp();
  } catch (e) {
    errEl.textContent = 'Could not reach server. Try again.'; errEl.style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

function showApp() {
  const sess = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
  if (!sess) return;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('loggedInAs').textContent = sess.name.trim() || sess.id;
  loadMemberList();
}

// Auto-resume session
window.addEventListener('DOMContentLoaded', () => {
  const sess = sessionStorage.getItem(SESSION_KEY);
  if (sess) showApp();
  document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });
});

// ── Member List ───────────────────────────────────────────────────────────────
async function loadMemberList() {
  document.getElementById('memberCount').textContent = 'Loading…';
  try {
    const data = await fetch(`${API}/members`).then(r => r.json());
    // Keep all statuses; sort: 1 first, H, W, 2, 3, 4, 5 — then alpha by last name
    const order = { '1':0, 'H':1, 'W':2, '2':3, '3':4, '4':5, '5':6 };
    _allMembers = (Array.isArray(data) ? data : []).sort((a, b) => {
      const sa = String(a.STATUS || a.status || a.STATU || '').trim();
      const sb = String(b.STATUS || b.status || b.STATU || '').trim();
      const oa = order[sa] ?? 9;
      const ob = order[sb] ?? 9;
      if (oa !== ob) return oa - ob;
      const la = (a.lastName || a['LAST NAME'] || a['LAST\nNAME'] || '').toLowerCase();
      const lb = (b.lastName || b['LAST NAME'] || b['LAST\nNAME'] || '').toLowerCase();
      return la.localeCompare(lb);
    });
    // Update tab counts
    const cnt = (fn) => _allMembers.filter(fn).length;
    document.getElementById('tc-active').textContent    = cnt(m => { const s=getStatus(m); return s==='1'||s==='H'||s==='W'; });
    document.getElementById('tc-alumni').textContent    = cnt(m => getStatus(m)==='2');
    document.getElementById('tc-discharged').textContent= cnt(m => getStatus(m)==='3');
    document.getElementById('tc-all').textContent       = _allMembers.length;
    filterMembers();
  } catch { document.getElementById('memberCount').textContent = 'Failed to load'; }
}

function getStatus(m) { return String(m.STATUS || m.status || m.STATU || '').trim(); }

function setTab(tab, el) {
  _activeTab = tab;
  document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterMembers();
}

function getMemberName(m) {
  const f = m.firstName || m['FIRST NAME'] || m['FIRST\nNAME'] || m['FIRST\r\nNAME'] || '';
  const l = m.lastName  || m['LAST NAME']  || m['LAST\nNAME']  || m['LAST\r\nNAME']  || '';
  return { first: f.trim(), last: l.trim(), full: (f + ' ' + l).trim() };
}

function renderMemberList(members) {
  const statusLabel = { '1':'Current','2':'Alumni','4':'Staff','5':'Admin','H':'Hold','W':'Waitlist','3':'Discharged' };
  const statusColor  = { '1':'#155724','2':'#004085','3':'#842029','H':'#856404','W':'#0c5460','4':'#4a5568','5':'#4a5568' };
  const statusBg     = { '1':'#d4edda','2':'#cce5ff','3':'#f8d7da','H':'#fff3cd','W':'#d1ecf1','4':'#e2e8f0','5':'#e2e8f0' };
  document.getElementById('memberCount').textContent = `${members.length} member${members.length !== 1 ? 's' : ''}`;
  document.getElementById('memberList').innerHTML = members.map(m => {
    const { full } = getMemberName(m);
    const id = m.ID || m.id || '';
    const s  = getStatus(m);
    const label = statusLabel[s] || s;
    const color = statusColor[s] || '#4a5568';
    const bg    = statusBg[s]    || '#e2e8f0';
    const bed = m.BED || m.bed || '';
    return `<div class="member-item" data-id="${id}" onclick="openMemberFile('${id}')">
      <div class="m-name">${esc(full || 'Unknown')} <span style="font-weight:400;color:#aaa;font-size:12px;">#${id}</span></div>
      <div class="m-meta" style="display:flex;gap:6px;align-items:center;margin-top:3px;">
        <span style="background:${bg};color:${color};padding:1px 7px;border-radius:8px;font-size:11px;font-weight:700;">${label}</span>
        ${bed ? `<span style="font-size:12px;color:#718096;">Bed ${bed}</span>` : ''}
      </div>
    </div>`;
  }).join('') || '<div style="padding:20px;color:#999;text-align:center;">No members found</div>';
}

function filterMembers() {
  const q = document.getElementById('memberSearch').value.toLowerCase();
  let list = _allMembers;
  if (!q) {
    // Apply tab filter
    if (_activeTab === 'active')     list = list.filter(m => { const s=getStatus(m); return s==='1'||s==='H'||s==='W'; });
    else if (_activeTab === 'alumni')     list = list.filter(m => getStatus(m)==='2');
    else if (_activeTab === 'discharged') list = list.filter(m => getStatus(m)==='3');
    // 'all' = no filter
  } else {
    // Search across all statuses
    list = list.filter(m => {
      const { full } = getMemberName(m);
      const id = String(m.ID || m.id || '');
      return full.toLowerCase().includes(q) || id.includes(q);
    });
  }
  renderMemberList(list);
}

// ── Member File ───────────────────────────────────────────────────────────────
async function openMemberFile(memberId) {
  _currentMemberId = memberId;
  document.querySelectorAll('.member-item').forEach(el => el.classList.toggle('active', el.dataset.id === String(memberId)));
  const fileDiv = document.getElementById('memberFile');
  document.getElementById('filePlaceholder').style.display = 'none';
  fileDiv.style.display = 'block';
  fileDiv.innerHTML = '<div style="color:#718096;padding:20px;">Loading file…</div>';

  try {
    const data = await fetch(`${API}/emr/member-file/${encodeURIComponent(memberId)}`).then(r => r.json());
    _currentMemberData = data;
    renderMemberFile(data);
  } catch (e) {
    fileDiv.innerHTML = `<div style="color:#e53e3e;padding:20px;">Failed to load file: ${e.message}</div>`;
  }
}

function renderMemberFile(data) {
  const { member, docs, drugScreens, passes, meetingCards, intakeForms, submittedForms, applications } = data;
  const { first, last, full } = getMemberName(member);
  const initials = (first[0] || '') + (last[0] || '');
  const s = String(member.STATUS || member.status || member.STATU || '').trim();
  const statusLabel = { '1':'Current','2':'Alumni','4':'Staff','5':'Admin','3':'Discharged','H':'Hold','W':'Waitlist' };
  const admitDate = member.admitDate || member['ADMIT DATE'] || member['ADMIT\nDATE'] || member['ADMIT\r\nDATE'] || '';
  const bed  = member.BED  || member.bed  || '';
  const phone= member.phone|| member.PHONE|| member['PHONE'] || '';
  const dob  = member.dob  || member.DOB  || member['D.O.B'] || member['DOB'] || '';

  // Total form count
  const intakeCount = Object.values(intakeForms || {}).reduce((t, arr) => t + (arr||[]).length, 0);
  const totalDocs = (docs||[]).length + (meetingCards||[]).length + (submittedForms||[]).length + intakeCount + (applications||[]).length;

  const html = `
    <div class="member-header">
      <div class="avatar">${esc(initials) || '?'}</div>
      <div class="info" style="flex:1;">
        <h2 style="cursor:pointer;text-decoration:underline dotted;" onclick="openProfileCard()" title="View full profile">${esc(full)}</h2>
        <div style="font-size:13px;color:#718096;">ID: ${member.ID || member.id || ''} ${phone ? '· ' + phone : ''} ${dob ? '· DOB: ' + dob : ''}</div>
        <div class="badges" style="margin-top:8px;">
          <span class="badge badge-green">${statusLabel[s] || s}</span>
          ${bed ? `<span class="badge badge-blue">Bed ${bed}</span>` : ''}
          ${admitDate ? `<span class="badge badge-gray">Admitted ${admitDate}</span>` : ''}
          <span class="badge badge-orange">${totalDocs} item${totalDocs !== 1 ? 's' : ''} in file</span>
        </div>
      </div>
    </div>

    <!-- Upload Bar -->
    <div class="upload-bar">
      <span style="font-weight:700;font-size:14px;white-space:nowrap;">⬆️ Add to File:</span>
      <select id="upDocType">
        <option value="Admission Paperwork">Admission Paperwork</option>
        <option value="Government ID">Government ID / Driver's License</option>
        <option value="Vehicle Registration">Vehicle Registration</option>
        <option value="Court Order">Court Order / Legal Document</option>
        <option value="Medical Record">Medical Record / Prescription</option>
        <option value="Insurance">Insurance Card</option>
        <option value="Employment">Employment / Pay Stub</option>
        <option value="Drug Screen">Drug Screen (paper)</option>
        <option value="Incident Report">Incident Report</option>
        <option value="Program Certificate">Program Certificate</option>
        <option value="Signed Agreement">Signed Agreement</option>
        <option value="Other">Other</option>
      </select>
      <input type="text" id="upNotes" placeholder="Description (optional)" style="flex:1;min-width:140px;">
      <div id="upFilePill" style="display:none;background:#fff3e0;border:1px solid #E1C462;border-radius:5px;padding:5px 10px;font-size:13px;font-weight:700;color:#5a3a00;">
        <span id="upFileName"></span>
        <button onclick="clearUpFile()" style="background:none;border:none;cursor:pointer;color:#e07020;margin-left:6px;font-size:15px;">✕</button>
      </div>
      <button class="btn-camera" onclick="document.getElementById('hiddenCameraInput').click()">📷</button>
      <button class="btn-upload-file" onclick="document.getElementById('hiddenFileInput').click()">📁 Browse</button>
      <button class="btn-upload-file" id="upSubmitBtn" onclick="doUpload()" disabled style="background:#2d6a4f;">⬆️ Upload</button>
      <div id="uploadStatusBar"></div>
    </div>

    ${sectionCard('📎 Uploaded Documents', docs, renderDocsTable(docs))}
    ${sectionCard('📋 Intake Forms', [{_count: intakeCount}], renderIntakeForms(intakeForms), intakeCount)}
    ${sectionCard('🧪 Drug Screens', drugScreens, renderDrugScreens(drugScreens))}
    ${sectionCard('🌙 Overnight Passes', passes, renderPasses(passes))}
    ${sectionCard('🪪 Meeting Cards', meetingCards, renderMeetingCards(meetingCards))}
    ${sectionCard('📝 Application', applications, renderApplications(applications))}
    ${sectionCard('📄 Submitted Forms', submittedForms, renderSubmittedForms(submittedForms))}
  `;

  document.getElementById('memberFile').innerHTML = html;
}

function sectionCard(title, items, bodyHtml, overrideCount) {
  const count = overrideCount !== undefined ? overrideCount : (items || []).length;
  const badgeClass = count > 0 ? '' : ' zero';
  return `
    <div class="section-card">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">${title} <span class="section-count${badgeClass}">${count}</span></div>
        <span class="section-chevron">▶</span>
      </div>
      <div class="section-body">${bodyHtml}</div>
    </div>`;
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.section-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

// ── Table Renderers ───────────────────────────────────────────────────────────
function renderDocsTable(docs) {
  if (!docs || !docs.length) return emptyRow('No documents uploaded yet');
  return `<table class="file-table"><thead><tr><th>Type</th><th>Description</th><th>Uploaded</th><th>Status</th><th></th></tr></thead><tbody>` +
    docs.slice().reverse().map(d => `<tr>
      <td><span style="font-size:16px;">${d.isPdf ? '📄' : '🖼️'}</span> ${esc(d.docType)}</td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(d.notes || d.originalName)}</td>
      <td style="white-space:nowrap;">${fmtDate(d.uploadedAt)}</td>
      <td><span class="badge ${d.savedToRecord ? 'badge-green' : 'badge-orange'}">${d.savedToRecord ? '✔ Saved' : 'Pending'}</span></td>
      <td style="white-space:nowrap;">
        <button class="btn-view" onclick="previewDoc('${d.id}','${esc(d.filename)}','${esc(d.originalName)}',${d.isPdf},'${esc(d.docType)}')">View</button>
        ${!d.savedToRecord ? `<button class="btn-view" style="background:#155724;margin-left:4px;" onclick="markSaved('${d.id}',this)">Save</button>` : ''}
      </td>
    </tr>`).join('') + `</tbody></table>`;
}

function renderIntakeForms(forms) {
  const sections = [
    { key: 'agreements', label: 'Member Agreement', icon: '📜' },
    { key: 'licensee',   label: 'Licensee Agreement', icon: '📜' },
    { key: 'roi',        label: 'Release of Information', icon: '📋' },
    { key: 'emergency',  label: 'Emergency Contact', icon: '🚨' },
    { key: 'liability',  label: 'Release of Liability', icon: '⚖️' },
    { key: 'property',   label: 'Personal Property Release', icon: '📦' },
  ];
  const rows = [];
  sections.forEach(s => {
    (forms[s.key] || []).forEach(f => {
      const subDate = f.submittedAt || f.createdAt || '';
      const sigName = f.signature?.name || f.memberInfo?.firstName || '';
      rows.push(`<tr>
        <td>${s.icon} ${s.label}</td>
        <td>${esc(sigName)}</td>
        <td style="white-space:nowrap;">${fmtDate(subDate)}</td>
        <td><span class="badge badge-green">Submitted</span></td>
        <td><button class="btn-view" onclick="previewJson(${JSON.stringify(JSON.stringify(f))}, '${esc(s.label)}')">View</button></td>
      </tr>`);
    });
  });
  if (!rows.length) return emptyRow('No intake forms on file');
  return `<table class="file-table"><thead><tr><th>Form</th><th>Signed By</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function renderDrugScreens(screens) {
  if (!screens || !screens.length) return emptyRow('No drug screens on file');
  return `<table class="file-table"><thead><tr><th>Date</th><th>Result</th><th>Tested By</th><th>Notes</th></tr></thead><tbody>` +
    screens.slice().reverse().map(s => `<tr>
      <td style="white-space:nowrap;">${fmtDate(s.testDate || s.submittedAt || s.createdAt)}</td>
      <td><span class="badge ${s.result === 'negative' || s.result === 'Negative' ? 'badge-green' : 'badge-orange'}">${esc(s.result || '—')}</span></td>
      <td>${esc(s.testedBy || s.staffName || '—')}</td>
      <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(s.notes || '—')}</td>
    </tr>`).join('') + `</tbody></table>`;
}

function renderPasses(passes) {
  if (!passes || !passes.length) return emptyRow('No overnight passes on file');
  return `<table class="file-table"><thead><tr><th>Submitted</th><th>Where</th><th>Return</th><th>Status</th></tr></thead><tbody>` +
    passes.slice().reverse().map(p => `<tr>
      <td style="white-space:nowrap;">${fmtDate(p.submittedAt)}</td>
      <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.where || p.destination || '—')}</td>
      <td style="white-space:nowrap;">${esc(p.returnDate || p.returnTime || '—')}</td>
      <td><span class="badge ${p.status==='approved'?'badge-green':p.status==='denied'?'badge-orange':'badge-gray'}">${esc(p.status||'pending')}</span></td>
    </tr>`).join('') + `</tbody></table>`;
}

function renderMeetingCards(cards) {
  if (!cards || !cards.length) return emptyRow('No meeting cards on file');
  return `<table class="file-table"><thead><tr><th>Date</th><th>Meeting</th><th>Type</th><th>Status</th><th></th></tr></thead><tbody>` +
    cards.slice().reverse().map(c => {
      const fileUrl = `${API}/meetingCards/image/${encodeURIComponent(c.imageFile || c.filename || '')}`;
      return `<tr>
        <td style="white-space:nowrap;">${fmtDate(c.meetingDate || c.submittedAt)}</td>
        <td>${esc(c.meetingName || '—')}</td>
        <td>${esc(c.meetingType || '—')}</td>
        <td><span class="badge ${c.status==='approved'?'badge-green':c.status==='rejected'?'badge-orange':'badge-gray'}">${esc(c.status||'pending')}</span></td>
        <td>${(c.imageFile||c.filename) ? `<button class="btn-view" onclick="previewImg('${fileUrl}','${esc(c.meetingName||'Meeting Card')}')">View</button>` : '—'}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
}

function renderApplications(apps) {
  if (!apps || !apps.length) return emptyRow('No application on file');
  return `<table class="file-table"><thead><tr><th>Submitted</th><th>Ref #</th><th>Status</th><th></th></tr></thead><tbody>` +
    apps.map(a => `<tr>
      <td style="white-space:nowrap;">${fmtDate(a.submittedAt || a.createdAt)}</td>
      <td>${esc(a.referenceNumber || a.id || '—')}</td>
      <td><span class="badge badge-green">${esc(a.status||'submitted')}</span></td>
      <td><button class="btn-view" onclick="previewJson(${JSON.stringify(JSON.stringify(a))}, 'Application')">View</button></td>
    </tr>`).join('') + `</tbody></table>`;
}

function renderSubmittedForms(forms) {
  if (!forms || !forms.length) return emptyRow('No submitted forms on file');
  return `<table class="file-table"><thead><tr><th>Type</th><th>Submitted</th><th>Status</th><th></th></tr></thead><tbody>` +
    forms.slice().reverse().map(f => `<tr>
      <td style="text-transform:capitalize;">${esc(f.type || f.formType || '—')}</td>
      <td style="white-space:nowrap;">${fmtDate(f.submittedAt || f.createdAt)}</td>
      <td><span class="badge badge-gray">${esc(f.status || 'filed')}</span></td>
      <td><button class="btn-view" onclick="previewJson(${JSON.stringify(JSON.stringify(f))}, '${esc(f.type||'Form')}')">View</button></td>
    </tr>`).join('') + `</tbody></table>`;
}

function emptyRow(msg) {
  return `<table class="file-table"><tbody><tr class="empty-row"><td>${msg}</td></tr></tbody></table>`;
}

// ── Upload ────────────────────────────────────────────────────────────────────
function fileChosen(input) {
  if (input.files && input.files[0]) {
    _pendingUploadFile = input.files[0];
    document.getElementById('upFilePill').style.display = 'inline-flex';
    document.getElementById('upFileName').textContent = _pendingUploadFile.name + ' (' + (_pendingUploadFile.size/1024).toFixed(1) + ' KB)';
    document.getElementById('upSubmitBtn').disabled = false;
  }
}

function clearUpFile() {
  _pendingUploadFile = null;
  document.getElementById('hiddenFileInput').value = '';
  document.getElementById('hiddenCameraInput').value = '';
  document.getElementById('upFilePill').style.display = 'none';
  document.getElementById('upSubmitBtn').disabled = true;
}

async function doUpload() {
  if (!_pendingUploadFile || !_currentMemberId) return;
  const member = _allMembers.find(m => String(m.ID||m.id||'') === String(_currentMemberId));
  const { full } = getMemberName(member || {});
  const btn = document.getElementById('upSubmitBtn');
  btn.disabled = true; btn.textContent = 'Uploading…';
  setUploadStatus('', '');

  const fd = new FormData();
  fd.append('document', _pendingUploadFile);
  fd.append('memberId', _currentMemberId);
  fd.append('memberName', full);
  fd.append('docType', document.getElementById('upDocType').value);
  fd.append('notes', document.getElementById('upNotes').value.trim());

  try {
    const res = await fetch(`${API}/member-documents/upload`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).error || 'Upload failed');
    setUploadStatus('success', '✅ Uploaded! Refreshing file…');
    clearUpFile();
    document.getElementById('upNotes').value = '';
    setTimeout(() => openMemberFile(_currentMemberId), 800);
  } catch (e) {
    setUploadStatus('error', '❌ ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '⬆️ Upload';
  }
}

function setUploadStatus(type, msg) {
  const el = document.getElementById('uploadStatusBar');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg; el.style.display = 'block';
  el.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
  el.style.color = type === 'success' ? '#155724' : '#721c24';
  el.style.border = type === 'success' ? '1px solid #c3e6cb' : '1px solid #f5c6cb';
}

async function markSaved(docId, btn) {
  try {
    await fetch(`${API}/member-documents/${encodeURIComponent(docId)}/save-to-record`, { method: 'POST' });
    btn.outerHTML = '<span class="badge badge-green">✔ Saved</span>';
  } catch { alert('Failed to save.'); }
}

// ── Preview ───────────────────────────────────────────────────────────────────
function previewDoc(docId, filename, originalName, isPdf, docType) {
  const url = `${API}/member-documents/file/${encodeURIComponent(filename)}`;
  _previewDoc = { docId, isPdf };
  document.getElementById('previewTitle').textContent = docType + ' — ' + originalName;
  document.getElementById('previewContent').innerHTML = isPdf
    ? `<iframe src="${url}" title="${esc(originalName)}"></iframe>`
    : `<img src="${url}" alt="${esc(originalName)}">`;
  document.getElementById('previewOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function previewImg(url, title) {
  _previewDoc = null;
  document.getElementById('previewTitle').textContent = title;
  document.getElementById('previewContent').innerHTML = `<img src="${url}" alt="${esc(title)}" style="max-width:100%;max-height:75vh;">`;
  document.getElementById('btnSaveRec').style.display = 'none';
  document.getElementById('previewOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function previewJson(jsonStr, title) {
  _previewDoc = null;
  let obj;
  try { obj = JSON.parse(jsonStr); } catch { obj = {}; }
  document.getElementById('previewTitle').textContent = title;
  document.getElementById('btnSaveRec').style.display = 'none';
  document.getElementById('previewContent').innerHTML = `<pre style="white-space:pre-wrap;font-size:13px;background:#f8fafb;padding:16px;border-radius:6px;max-height:70vh;overflow:auto;">${esc(JSON.stringify(obj, null, 2))}</pre>`;
  document.getElementById('previewOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  document.getElementById('previewOverlay').style.display = 'none';
  document.getElementById('previewContent').innerHTML = '';
  document.getElementById('btnSaveRec').style.display = '';
  _previewDoc = null;
  document.body.style.overflow = '';
}

function printPreview() {
  const content = document.getElementById('previewContent');
  const iframe = content.querySelector('iframe');
  const img = content.querySelector('img');
  if (iframe) { iframe.contentWindow.print(); return; }
  if (img) {
    const w = window.open('', '_blank');
    w.document.write(`<html><body style="margin:0"><img src="${img.src}" style="max-width:100%"></body></html>`);
    w.document.close();
    w.onload = () => { w.print(); };
    return;
  }
  window.print();
}

async function savePreviewToRecord() {
  if (!_previewDoc?.docId) return;
  await markSaved(_previewDoc.docId, { outerHTML: '' });
  document.getElementById('btnSaveRec').style.display = 'none';
}

// ── Profile Card ─────────────────────────────────────────────────────────────
function openProfileCard() {
  if (!_currentMemberData) return;
  const m = _currentMemberData.member;
  const { first, last, full } = getMemberName(m);
  const initials = (first[0]||'') + (last[0]||'');
  const statusLabel = { '1':'Current','2':'Alumni','3':'Discharged','4':'Staff','5':'Admin','H':'Hold','W':'Waitlist' };
  const s = getStatus(m);

  document.getElementById('pcAvatar').textContent = initials || '?';
  document.getElementById('pcName').textContent   = full;
  document.getElementById('pcId').textContent     = `Member ID: ${m.ID || m.id || '—'}`;

  const fields = [
    { label:'Status',      val: statusLabel[s] || s },
    { label:'Bed',         val: m.BED || m.bed || '—' },
    { label:'Date of Birth', val: m.dob || m.DOB || m['D.O.B'] || '—' },
    { label:'Admit Date',  val: m.admitDate || m['ADMIT DATE'] || m['ADMIT\nDATE'] || m['ADMIT\r\nDATE'] || '—' },
    { label:'Sober Date',  val: m.soberDate || m['SOBER DATE'] || m['SOBER\nDATE'] || m['SOBER\r\nDATE'] || '—' },
    { label:'Phone',       val: m.phone || m.PHONE || '—' },
    { label:'Email',       val: m.email || m.EMAIL || '—' },
    { label:'Rate',        val: m.rate  || m.RATE  || '—' },
    { label:'Bill On Day', val: m.billOnDay || m['BILL ON DAY'] || m['BILL\r\nON DAY'] || '—' },
    { label:'Ref',         val: m.ref   || m.REF   || '—' },
    { label:'Key',         val: m.key   || m.KEY   || '—' },
    { label:'Gender',      val: m.gender|| m['M/F']|| '—' },
  ];

  document.getElementById('pcGrid').innerHTML = fields.map(f =>
    `<div class="profile-field"><label>${esc(f.label)}</label><span>${esc(String(f.val))}</span></div>`
  ).join('');

  document.getElementById('profileOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeProfileCard() {
  document.getElementById('profileOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

// Close overlays on backdrop click
document.addEventListener('click', e => {
  if (e.target.id === 'profileOverlay') closeProfileCard();
  if (e.target.id === 'previewOverlay') closePreview();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); } catch { return d; }
}
</script>
