<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member List Dashboard (Local Test)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 1400px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; }
    h1 { text-align: center; color: #c95f00; margin-bottom: 32px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #e0e0e0; padding: 4px 2px; text-align: center; font-size: 13px; }
    th {
      background: #F58634;
      color: #fff;
      font-weight: 700;
      height: 120px;
      min-width: 32px;
      max-width: 60px;
      white-space: nowrap;
      border-bottom: 3px solid #fff;
      border-right: 2px solid #fff;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-align: center;
      vertical-align: middle;
      position: relative;
    }
    th .vertical-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      transform: rotate(-90deg);
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      text-align: center;
      margin: 0;
      position: relative;
    }
    th.nickname, td.nickname { background: #ffe0b2; }
    th[colspan], td[colspan] { writing-mode: horizontal-tb; }
    tr:nth-child(even) { background: #faf6f2; }
    tr:hover { background: #fff3e8; }
    .sticky-header th { position: sticky; top: 0; z-index: 2; }
    /* Precise column widths */
    th.narrow, td.narrow { width: 32px; min-width: 32px; max-width: 36px; }
    th[colname="NICKNAME"], td[colname="NICKNAME"] { min-width: 80px; max-width: 120px; background: #ffe0b2; }
    th[colname="FIRST"], td[colname="FIRST"], th[colname="LAST"], td[colname="LAST"] { min-width: 70px; max-width: 110px; }
    th[colname="EMAIL"], td[colname="EMAIL"] { min-width: 120px; max-width: 220px; }
    th[colname="PHONE"], td[colname="PHONE"] { min-width: 90px; max-width: 120px; }
    th[colname="ADMIT DATE"], td[colname="ADMIT DATE"], th[colname="DISCHARGE DATE"], td[colname="DISCHARGE DATE"], th[colname="DOB"], td[colname="DOB"], th[colname="SOBER DATE"], td[colname="SOBER DATE"] { min-width: 60px; max-width: 90px; }
    th[colname="BILL ON DAY"], td[colname="BILL ON DAY"] { min-width: 40px; max-width: 60px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Member List</h1>
    <div style="overflow-x:auto;">
      <table>
        <thead class="sticky-header">
          <tr>
            <th class="narrow" colname="#"><span class="vertical-text">#</span></th>
            <th class="narrow" colname="YR"><span class="vertical-text">YR</span></th>
            <th class="narrow" colname="ID"><span class="vertical-text">ID</span></th>
            <th class="narrow" colname="STATUS"><span class="vertical-text">STATUS</span></th>
            <th class="narrow" colname="M/F"><span class="vertical-text">M/F</span></th>
            <th colname="FIRST"><span class="vertical-text">FIRST</span></th>
            <th colname="LAST"><span class="vertical-text">LAST</span></th>
            <th colname="ADMIT DATE"><span class="vertical-text">ADMIT DATE</span></th>
            <th colname="DISCHARGE DATE"><span class="vertical-text">DISCHARGE DATE</span></th>
            <th class="narrow" colname="DAYS HERE"><span class="vertical-text">DAYS HERE</span></th>
            <th class="narrow" colname="BED"><span class="vertical-text">BED</span></th>
            <th class="narrow" colname="KEY"><span class="vertical-text">KEY</span></th>
            <th class="narrow" colname="REF"><span class="vertical-text">REF</span></th>
            <th class="narrow" colname="RATE"><span class="vertical-text">RATE</span></th>
            <th class="nickname" colname="NICKNAME"><span class="vertical-text">NICKNAME</span></th>
            <th colname="DOB"><span class="vertical-text">DOB</span></th>
            <th colname="SOBER DATE"><span class="vertical-text">SOBER DATE</span></th>
            <th class="narrow" colname="DAYSOBER"><span class="vertical-text">DAYSOBER</span></th>
            <th colname="PHONE"><span class="vertical-text">PHONE</span></th>
            <th colname="EMAIL"><span class="vertical-text">EMAIL</span></th>
            <th class="narrow" colname="PIN"><span class="vertical-text">PIN</span></th>
            <th colname="BILL ON DAY"><span class="vertical-text">BILL ON DAY</span></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td><td>2026</td><td>001</td><td>1</td><td>M</td><td>John</td><td>Doe</td><td>01/01/2026</td><td></td><td>100</td><td>A1</td><td>Y</td><td>Ref1</td><td>200</td><td class="nickname">Johnny</td><td>01/01/1990</td><td>12/01/2025</td><td>120</td><td>555-1234</td><td>john@example.com</td><td>1234</td><td>1</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
